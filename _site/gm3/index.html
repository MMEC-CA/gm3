      // Deflation: shrinks along horizontal (fling axis), wobbles vertical
      var shrink = Math.max(0.25, 1 - t * 0.9);
      var wobble = 1 + 0.12 * Math.sin(t * 40);
      var rx = r * shrink;
      var ry = r * (0.7 + 0.3 * wobble) * (0.7 + 0.3 * shrink);
      ctx.save(); ctx.translate(sp.x, sp.y);

      // Trailing air stream (behind the fling direction)
      ctx.fillStyle = 'rgba(255,255,255,' + Math.max(0, 0.4 - t * 0.12) + ')';
      for (var ai = 0; ai < 6; ai++) {
        var trailDist = (ai + 1) * r * 0.35;
        var trailX = -flingSign * trailDist;
        var trailY = (Math.random() - 0.5) * r * 0.4;
        var trailR = r * 0.18 * (1 - ai / 6);
        ctx.beginPath(); ctx.arc(trailX, trailY, trailR, 0, Math.PI * 2); ctx.fill();
      }

      // Deflated body (squished along fling axis)
      var bodyGrad = ctx.createRadialGradient(-rx * 0.3 * flingSign, -ry * 0.3, rx * 0.1, 0, 0, Math.max(rx, ry));
      bodyGrad.addColorStop(0, '#6b1010');
      bodyGrad.addColorStop(1, '#1a0000');
      ctx.fillStyle = bodyGrad;
      // Draw torn/ragged silhouette: main body + a jagged hole opposite fling direction
      var holeAngle = flingSign > 0 ? Math.PI : 0; // hole on the opposite side of fling
      ctx.beginPath();
      var segs = 24;
      for (var si = 0; si <= segs; si++) {
        var a = si / segs * Math.PI * 2;
        var da = ((a - holeAngle + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
        var nearHole = Math.abs(da) < 0.8;
        var radX = rx * (nearHole ? (0.35 + 0.25 * Math.abs(da) / 0.8) : 1);
        var radY = ry * (nearHole ? (0.35 + 0.25 * Math.abs(da) / 0.8) : 1);
        // Ragged edge noise
        var jag = 1 + (Math.sin(si * 3.7 + t * 10) * 0.08);
        var px = Math.cos(a) * radX * jag;
        var py = Math.sin(a) * radY * jag;
        if (si === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 2; ctx.stroke();

      // Shredded flaps near the hole
      ctx.strokeStyle = '#3b0a0a'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      for (var fi = 0; fi < 5; fi++) {
        var fa = holeAngle + (fi - 2) * 0.35;
        var fx = Math.cos(fa) * rx * 0.5;
        var fy = Math.sin(fa) * ry * 0.5;
        var fx2 = Math.cos(fa) * rx * (0.95 + 0.1 * Math.sin(t * 30 + fi));
        var fy2 = Math.sin(fa) * ry * (0.95 + 0.1 * Math.sin(t * 30 + fi));
        ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx2, fy2); ctx.stroke();
      }

      // X-eyes (dead)
      ctx.strokeStyle = '#000'; ctx.lineWidth = 2.5;
      var exR = rx * 0.1;
      var eyeY = -ry * 0.15;
      [-rx * 0.25, rx * 0.25].forEach(function (ex) {
        ctx.beginPath(); ctx.moveTo(ex - exR, eyeY - exR); ctx.lineTo(ex + exR, eyeY + exR); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ex - exR, eyeY + exR); ctx.lineTo(ex + exR, eyeY - exR); ctx.stroke();
      });

      ctx.restore();
    }

    // Pufferball: deep-red fluffy orb, inflates/deflates on breath cycle, squishes small during contraction (burst-down)
    function drawPufferball(bird, sp) {
      var r = Math.max(bird.w, bird.h) * 0.5;
      // Dying/popped state — ripped open, deflating balloon rocketing offscreen
      if (bird.dying) {
        drawPufferballPopped(bird, sp, r);
        return;
      }
      // Contraction scale: 1.0 at rest → ~0.65 while contracted
      var ctr = bird.contractT > 0 ? (bird.contractT / 0.35) : 0;
      var breath = 1 + 0.05 * Math.sin((gameTime * 2) + (bird.puffPhase || 0));
      var scale = breath * (1 - 0.35 * ctr);
      var rr = r * scale;
      ctx.save(); ctx.translate(sp.x, sp.y);

      // Outer soft halo (dark red glow)
      var g = ctx.createRadialGradient(0, 0, rr * 0.2, 0, 0, rr * 1.4);
      g.addColorStop(0, 'rgba(160,20,20,0.6)');
      g.addColorStop(1, 'rgba(80,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(0, 0, rr * 1.4, 0, Math.PI * 2); ctx.fill();

      // Fluffy puff-bumps around rim — 12 overlapping circles for cloud-like silhouette
      ctx.fillStyle = '#3b0a0a';
      var puffs = 12;
      for (var i = 0; i < puffs; i++) {
        var a = i * Math.PI * 2 / puffs + (bird.puffPhase || 0) * 0.1;
        var pr = rr * 0.42 * (0.9 + 0.1 * Math.sin(gameTime * 3 + i));
        var px = Math.cos(a) * rr * 0.78;
        var py = Math.sin(a) * rr * 0.78;
        ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI * 2); ctx.fill();
      }

      // Main body sphere
      var bodyGrad = ctx.createRadialGradient(-rr * 0.3, -rr * 0.3, rr * 0.1, 0, 0, rr);
      bodyGrad.addColorStop(0, '#8b1a1a');
      bodyGrad.addColorStop(1, '#2a0505');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath(); ctx.arc(0, 0, rr * 0.88, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();

      // Mouth: round "O" when contracting (blowing air out); small slit when idle
      if (ctr > 0.15) {
        var mouthR = rr * (0.14 + 0.12 * ctr);
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(0, rr * 0.15, mouthR, 0, Math.PI * 2); ctx.fill();
        // Puff of air above the pufferball when contracting (air is shot upward)
        ctx.fillStyle = 'rgba(255,255,255,' + (0.5 * ctr) + ')';
        for (var pi = 0; pi < 5; pi++) {
          var paX = (Math.random() - 0.5) * rr * 0.6;
          var paY = -rr * (1.1 + Math.random() * 0.6 + ctr * 0.3);
          var paR = rr * 0.15 * (0.6 + Math.random() * 0.6);
          ctx.beginPath(); ctx.arc(paX, paY, paR, 0, Math.PI * 2); ctx.fill();
        }
      } else {
        ctx.fillStyle = '#000';
        ctx.fillRect(-rr * 0.08, rr * 0.10, rr * 0.16, rr * 0.05);
      }

      // Eyes (two small dark dots, angry brow)
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-rr * 0.25, -rr * 0.15, rr * 0.12, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(rr * 0.25, -rr * 0.15, rr * 0.12, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-rr * 0.22, -rr * 0.13, rr * 0.06, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(rr * 0.28, -rr * 0.13, rr * 0.06, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-rr * 0.4, -rr * 0.32); ctx.lineTo(-rr * 0.1, -rr * 0.22); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rr * 0.4, -rr * 0.32); ctx.lineTo(rr * 0.1, -rr * 0.22); ctx.stroke();

      ctx.restore();
    }

    function drawBird(bird) {
      var sp = toScr(bird.x, bird.y);
      var bw = bird.w, bh = bird.h;
      var facing = bird.vx < -10 ? -1 : bird.vx > 10 ? 1 : (bird.mDir || 1);
      var drawCol = bird.col;
      if (bird.type === 'player' && flashTimer > 0) { drawCol = 'rgba(255,255,255,' + (flashTimer / 0.9) + ')'; }

      // DeathBird — rendered as a "pufferball"
      if (bird.type === 'death') {
        drawPufferball(bird, sp);
        return;
      }

      // Speed trail
      if (bird.trail.length > 1) {
        ctx.save(); ctx.globalAlpha = 0.3; ctx.strokeStyle = bird.col; ctx.lineWidth = bird.w * 0.3; ctx.lineCap = 'round';
        ctx.beginPath();
        var t0 = toScr(bird.trail[0].x, bird.trail[0].y); ctx.moveTo(t0.x, t0.y);
        for (var ti = 1; ti < bird.trail.length; ti++) { var tp = toScr(bird.trail[ti].x, bird.trail[ti].y); ctx.lineTo(tp.x, tp.y); }
        ctx.lineTo(sp.x, sp.y); ctx.stroke(); ctx.globalAlpha = 1; ctx.restore();
      }

      // Halo
      ctx.save(); ctx.translate(sp.x, sp.y);
      var hr = Math.max(bw, bh) * 0.7;
      ctx.beginPath(); ctx.arc(0, 0, hr, 0, Math.PI * 2);
      ctx.fillStyle = bird.type === 'player' ? 'rgba(255,230,0,0.12)' : 'rgba(200,200,255,0.08)'; ctx.fill();
      ctx.strokeStyle = bird.type === 'player' ? 'rgba(255,230,0,0.3)' : 'rgba(200,200,255,0.15)'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.restore();

      // Draw order: wings → riders (screen space) → body+head
      var bodyW = bw * 0.55, bodyH = bh * 0.6;
      var wW = bw * 0.8, wH = bh * 1.2;

      // 1. Wings (in bird's squash/stretch space)
      ctx.save(); ctx.translate(sp.x, sp.y); ctx.scale(facing * bird.squashX, bird.squashY);
      ctx.save(); ctx.translate(-bw * 0.15, 0); ctx.rotate(-bird.wAng);
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(-wW * 0.5, -wH * 0.5, -wW, -wH * 0.3);
      ctx.quadraticCurveTo(-wW * 1.1, -wH * 0.2, -wW * 0.8, 0);
      ctx.quadraticCurveTo(-wW * 0.5, wH * 0.2, 0, 0);
      ctx.fillStyle = drawCol; ctx.globalAlpha = 0.8; ctx.fill(); ctx.globalAlpha = 1; ctx.restore();
      ctx.save(); ctx.translate(bw * 0.15, 0); ctx.rotate(bird.wAng);
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(wW * 0.5, -wH * 0.5, wW, -wH * 0.3);
      ctx.quadraticCurveTo(wW * 1.1, -wH * 0.2, wW * 0.8, 0);
      ctx.quadraticCurveTo(wW * 0.5, wH * 0.2, 0, 0);
      ctx.fillStyle = drawCol; ctx.globalAlpha = 0.8; ctx.fill(); ctx.globalAlpha = 1; ctx.restore();
      ctx.restore(); // end wings transform

      // 2. Mounted riders (game space, proportional to bird)
      if (bird.rider && bird.rider.mounted) {
        var riderFH = bh * 0.8; // proportional to bird height (always correct regardless of sf)
        var riderBaseY = sp.y - bh * 0.35; // sits on top of bird body
        var baseSpacing = bw * 0.25;
        var allRiders = [bird.rider];
        if (bird.passengers) { for (var pri = 0; pri < bird.passengers.length; pri++) allRiders.push(bird.passengers[pri]); }
        for (var ri = 0; ri < allRiders.length; ri++) {
          var rr = allRiders[ri];
          var offX = 0;
          if (ri > 0) {
            var passengerIdx = ri;
            var pair = Math.ceil(passengerIdx / 2);
            var spacing = baseSpacing / Math.pow(2, pair - 1);
            offX = (passengerIdx % 2 === 1) ? spacing : -spacing;
          }
          var fh = riderFH;
          var rHeadR = fh * 0.15, rlw = Math.max(1.5, fh * 0.06);
          ctx.save(); ctx.translate(sp.x + offX, riderBaseY);
          ctx.beginPath(); ctx.moveTo(0, -fh * 0.25); ctx.lineTo(0, fh * 0.05);
          ctx.strokeStyle = rr.col; ctx.lineWidth = rlw; ctx.stroke();
          ctx.beginPath(); ctx.arc(0, -fh * 0.25 - rHeadR, rHeadR, 0, Math.PI * 2);
          ctx.fillStyle = rr.col; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
          ctx.beginPath(); ctx.moveTo(-fh * 0.16, -fh * 0.1); ctx.lineTo(0, -fh * 0.15); ctx.lineTo(fh * 0.16, -fh * 0.1);
          ctx.strokeStyle = rr.col; ctx.lineWidth = rlw * 0.7; ctx.stroke();
          ctx.beginPath(); ctx.moveTo(-fh * 0.07, fh * 0.05); ctx.lineTo(-fh * 0.09, fh * 0.18);
          ctx.moveTo(fh * 0.07, fh * 0.05); ctx.lineTo(fh * 0.09, fh * 0.18);
          ctx.stroke();
          ctx.restore();
        }
      }

      // 3. Body + head (in bird's squash/stretch space, in front of riders)
      ctx.save(); ctx.translate(sp.x, sp.y); ctx.scale(facing * bird.squashX, bird.squashY);

      // 3. Body (in front of rider)
      ctx.beginPath(); ctx.ellipse(0, 0, bodyW / 2, bodyH / 2, 0, 0, Math.PI * 2);
      ctx.fillStyle = drawCol; ctx.fill(); ctx.strokeStyle = '#00000040'; ctx.lineWidth = 1.5; ctx.stroke();

      // (DeathBird rendering handled by drawPufferball — see early-return above)

      // 4. Head + beak (in front of everything, offset horizontally by headLean)
      var headR = bw * 0.15, headY = -(bodyH * 0.3);
      // headLean is in world space (-1=left, +1=right), but canvas is flipped by facing
      // Multiply by facing so the offset is correct in the flipped coordinate space
      var headOffX = bird.headLean * facing * bw * 0.15;
      ctx.save(); ctx.translate(headOffX, headY);
      ctx.beginPath(); ctx.arc(0, 0, headR, 0, Math.PI * 2); ctx.fillStyle = drawCol; ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 0.8; ctx.stroke();
      var bs = headR * 0.5;
      ctx.beginPath(); ctx.moveTo(-bs * 0.3, headR * 0.5); ctx.lineTo(bs * 0.3, headR * 0.5); ctx.lineTo(0, headR * 0.5 + bs * 0.7); ctx.closePath();
      ctx.fillStyle = '#d4a020'; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 0.8; ctx.stroke();
      ctx.restore();

      // Legs (walking)
      if (bird.st === 'walk') {
        var legSwing = Math.sin(gameTime * 12) * bird.legH * 0.3;
        ctx.fillStyle = drawCol;
        ctx.save(); ctx.translate(-3 * bird.sf, bh / 2); ctx.rotate(legSwing * 0.02);
        ctx.fillRect(0, 0, 4 * bird.sf, bird.legH); ctx.restore();
        ctx.save(); ctx.translate(3 * bird.sf, bh / 2); ctx.rotate(-legSwing * 0.02);
        ctx.fillRect(0, 0, 4 * bird.sf, bird.legH); ctx.restore();
      }
      ctx.restore();

      // (passengers now drawn inline beside primary rider above)
    }

    // drawMountedRider is now inline in drawBird (between wings and body)
    function drawMountedRider(bird, sp) { /* no-op, handled inline */ }

    function drawRider(rider, sp) {
      ctx.save(); ctx.translate(sp.x, sp.y);
      var fh = rider.figH, headR = fh * 0.18, lw = Math.max(1.5, rider.w * 0.12);
      var olw = lw + Math.max(2, rider.w * 0.1); // outline width (Xcode-style)
      var armLen = fh * 0.28; // bigger arms
      // Check if a player bird is close above — rider waves arms frantically
      var playerBirdNearAbove = false;
      for (var pbi = 0; pbi < gameBirds.length; pbi++) {
        var pb = gameBirds[pbi];
        if (!pb.alive || pb.resp) continue;
        var dx = Math.abs(pb.x - rider.x), dy = pb.y - rider.y;
        if (dx < 120 && dy > 0 && dy < 200) { playerBirdNearAbove = true; break; }
      }
      // Outline pass — white behind all limbs for visibility
      ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = olw; ctx.lineCap = 'round';
      // Outline body
      ctx.beginPath(); ctx.moveTo(0, -fh * 0.4 + headR); ctx.lineTo(0, 0); ctx.stroke();
      // Head
      ctx.beginPath(); ctx.arc(0, -fh * 0.4, headR, 0, Math.PI * 2); ctx.fillStyle = rider.col; ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
      // Body
      ctx.beginPath(); ctx.moveTo(0, -fh * 0.4 + headR); ctx.lineTo(0, 0); ctx.strokeStyle = rider.col; ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.stroke();
      // Arms
      if (playerBirdNearAbove && rider.st !== 'fall') {
        // Waving: arms reach up and wave frantically
        var waveL = Math.sin(gameTime * 16) * 0.5;
        var waveR = Math.sin(gameTime * 16 + 2.0) * 0.5;
        var shoulderY = -fh * 0.25;
        ctx.beginPath();
        ctx.moveTo(-armLen * 0.6, shoulderY - armLen * 0.8 + waveL * armLen * 0.4);
        ctx.lineTo(0, shoulderY);
        ctx.lineTo(armLen * 0.6, shoulderY - armLen * 0.8 + waveR * armLen * 0.4);
        ctx.stroke();
      } else if (rider.st === 'fall') {
        // Airborne: arms flail
        ctx.beginPath();
        ctx.moveTo(-armLen * 0.7, -fh * 0.35 + Math.sin(gameTime * 14) * 6);
        ctx.lineTo(0, -fh * 0.25);
        ctx.lineTo(armLen * 0.7, -fh * 0.35 + Math.sin(gameTime * 14 + 1.5) * 6);
        ctx.stroke();
      } else {
        // Walking/idle: arms at sides, gentle sway only when moving
        var armSwing = Math.abs(rider.vx) > 8 ? Math.sin(gameTime * 9) * 0.08 : 0;
        ctx.beginPath();
        ctx.moveTo(-armLen * 0.5, -fh * 0.12 + armSwing * fh);
        ctx.lineTo(0, -fh * 0.25);
        ctx.lineTo(armLen * 0.5, -fh * 0.12 - armSwing * fh);
        ctx.stroke();
      }
      // Legs
      if (rider.st === 'walk' && Math.abs(rider.vx) > 8) {
        // Walking: legs swing based on speed
        var ls = Math.sin(gameTime * 9) * fh * 0.12;
        ctx.beginPath(); ctx.moveTo(-ls, fh * 0.3); ctx.lineTo(0, 0); ctx.lineTo(ls, fh * 0.3); ctx.stroke();
      } else if (rider.st === 'fall') {
        // Airborne: legs spread
        ctx.beginPath(); ctx.moveTo(-fh * 0.08, fh * 0.3); ctx.lineTo(0, 0); ctx.lineTo(fh * 0.08, fh * 0.3); ctx.stroke();
      } else {
        // Idle/standing: legs together, slight stance
        ctx.beginPath(); ctx.moveTo(-fh * 0.04, fh * 0.3); ctx.lineTo(0, 0); ctx.lineTo(fh * 0.04, fh * 0.3); ctx.stroke();
      }
      ctx.restore();
    }

    // ============================================================
    // INPUT HANDLING
    // ============================================================
    window.addEventListener('keydown', function (e) {
      initAudio();
      if (lobbyState === 'lobby' || lobbyState === 'countdown') {
        if (e.key === 'ArrowLeft') { changeLevel(-1); e.preventDefault(); return; }
        if (e.key === 'ArrowRight') { changeLevel(1); e.preventDefault(); return; }
        // Either "up" key claims P1 first time, then the OTHER "up" claims P2
        if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
          if (e.repeat) { e.preventDefault(); return; }
          var side = (e.key === 'w' || e.key === 'W') ? 'wasd' : 'arrows';
          if (mySlotIndex < 0) {
            // No P1 yet — this side claims P1
            p1Side = side;
            startHold();
          } else if (side === p1Side || !p1Side) {
            // Same side as P1 — hold for P1
            if (!p1Side) p1Side = side;
            startHold();
          } else {
            // Other side — this is P2 (only claims slot when hold completes)
            startHoldP2();
          }
          e.preventDefault();
          return;
        }
      }
      if (lobbyState === 'gameover') {
        // 5-second input lockout after game ends — avoids accidental dismissal
        if (performance.now() / 1000 - gameOverTime < GAME_OVER_LOCKOUT) { e.preventDefault(); return; }
        lobbyState = 'lobby'; mySlotIndex = -1; cfg = null;
        hasLocalPlayer2 = false; localPlayer2PeerId = null; localPlayer2SlotIndex = -1;
        ctrlMode2 = 'bird'; p1Side = null;
        for (var si = 0; si < 12; si++) { slots[si].peerId = null; slots[si].ready = false; slots[si].progress = 0; slots[si].holding = false; }
        gameBirds = []; aiBirds = []; dBirds = []; dRiders = []; fTexts = [];
        e.preventDefault(); return;
      }
      if (lobbyState === 'game') {
        // ESC or backtick: host quits game for everyone
        if (e.key === 'Escape' || e.key === '`') {
          if (isHost) {
            // End game immediately — broadcast quit to all
            lobbyState = 'gameover';
            fTexts.push({ text: 'GAME ENDED', x: GW / 2, y: GH * 0.7, life: 999 });
            fTexts.push({ text: 'Tap to return to lobby', x: GW / 2, y: GH * 0.4, life: 999 });
            broadcast({ type: 'gameover', wave: wave, winnerPid: null, winnerName: 'Nobody', pScores: playerScores, quit: true });
          }
          e.preventDefault(); return;
        }
        // Route arrow keys and WASD to P1/P2 based on which side claimed P1
        var isWasd = (e.key === 'a' || e.key === 'A' || e.key === 'd' || e.key === 'D' || e.key === 'w' || e.key === 'W' || e.key === 's' || e.key === 'S');
        var isArrow = (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ');
        var isP1Key = (isArrow && p1Side !== 'wasd') || (isWasd && p1Side === 'wasd');
        var isP2Key = hasLocalPlayer2 && ((isWasd && p1Side !== 'wasd') || (isArrow && p1Side === 'wasd'));
        var k = isP2Key ? keys2 : keys;
        var fe = isP2Key ? flapEdge2 : flapEdge;
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') k.l = true;
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') k.r = true;
        if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w' || e.key === 'W') {
          if (!k.flap) { if (isP2Key) flapEdge2 = true; else flapEdge = true; }
          k.flap = true;
        }
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') k.dn = true;
      }
      e.preventDefault();
    });

    window.addEventListener('keyup', function (e) {
      if (lobbyState === 'lobby' || lobbyState === 'countdown') {
        if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
          var side2 = (e.key === 'w' || e.key === 'W') ? 'wasd' : 'arrows';
          if (side2 === p1Side) releaseHold();
          else if (hasLocalPlayer2) releaseHoldP2();
          else releaseHold(); // fallback if p1Side not yet set
          return;
        }
      }
      if (lobbyState === 'game') {
        var isWasd2 = (e.key === 'a' || e.key === 'A' || e.key === 'd' || e.key === 'D' || e.key === 'w' || e.key === 'W' || e.key === 's' || e.key === 'S');
        var isArrow2 = (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ');
        var isP2Up = hasLocalPlayer2 && ((isWasd2 && p1Side !== 'wasd') || (isArrow2 && p1Side === 'wasd'));
        var ku = isP2Up ? keys2 : keys;
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') ku.l = false;
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') ku.r = false;
        if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w' || e.key === 'W') ku.flap = false;
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') ku.dn = false;
      }
    });

    // Touch input with orientation-aware zones
    var touchHolding = false;
    var touchZoneFlash = { l: 0, r: 0, f: 0 }; // base flashes
    var touchZoneFlash6 = { le: 0, fl: 0, ri: 0, ft: 0, ap: 0, te: 0 }; // portrait 6-zone flashes
    function isPortrait() { return window.innerHeight > window.innerWidth; }
    // Returns touch zone(s) as {l:bool, r:bool, f:bool}
    function getTouchZones(clientX, clientY) {
      var w = window.innerWidth, h = window.innerHeight;
      var result = { l: false, r: false, f: false };
      if (isPortrait()) {
        // Portrait: top 1/3 = status, bottom 2/3 = 6 zones (3 cols × 2 rows)
        // Row 0 (upper): LE(left+flap) | FL(flap) | RI(right+flap)
        // Row 1 (lower): FT(left)      | AP(flap) | TE(right)
        if (clientY < h / 3) return result; // status area
        var col = clientX / w;
        var midY = h / 3 + (h * 2 / 3) / 2;
        var isUpper = clientY < midY;
        if (col < 0.33) {
          result.l = true;
          if (isUpper) { result.f = true; touchZoneFlash6.le = 0.3; touchZoneFlash6.fl = 0.3; touchZoneFlash6.ap = 0.3; } // LE → LE + all FLAP
          else { touchZoneFlash6.ft = 0.3; } // FT only
        } else if (col > 0.67) {
          result.r = true;
          if (isUpper) { result.f = true; touchZoneFlash6.ri = 0.3; touchZoneFlash6.fl = 0.3; touchZoneFlash6.ap = 0.3; } // RI → RI + all FLAP
          else { touchZoneFlash6.te = 0.3; } // TE only
        } else {
          result.f = true;
          touchZoneFlash6.fl = 0.3; touchZoneFlash6.ap = 0.3; // FLAP → FL + AP
        }
      } else {
        // Landscape: left 1/5=LEFT (no flap), next 1/5=RITE (no flap), right 1/5=FLAP
        var frac = clientX / w;
        if (frac < 0.2) result.l = true;
        else if (frac < 0.4) result.r = true;
        else if (frac > 0.8) result.f = true;
      }
      return result;
    }
    canvas.addEventListener('touchstart', function (e) {
      e.preventDefault(); initAudio();
      if (lobbyState === 'lobby' || lobbyState === 'countdown') {
        // Dismiss tooltip on any touch
        if (webrtcTooltip) { webrtcTooltip = false; return; }
        var scX = canvas.width / GW, scY = canvas.height / GH, sc = Math.min(scX, scY);
        var oX = (canvas.width - GW * sc) / 2, oY = (canvas.height - GH * sc) / 2;
        for (var ti = 0; ti < e.touches.length; ti++) {
          var tx = (e.touches[ti].clientX - oX) / sc;
          var ty = (e.touches[ti].clientY - oY) / sc;
          // Tap on "WebRTC" title text → show tooltip
          if (isInWebrtcHit(tx, ty)) { webrtcTooltip = true; return; }
          // Level left arrow area
          if (tx > GW * 0.3 && tx < GW * 0.4 && ty > 80 && ty < 140) { changeLevel(-1); return; }
          // Level right arrow area
          if (tx > GW * 0.6 && tx < GW * 0.7 && ty > 80 && ty < 140) { changeLevel(1); return; }
        }
        // Otherwise, hold to ready
        touchHolding = true;
        startHold();
        return;
      }
      if (lobbyState === 'gameover') {
        // 5-second input lockout after game ends
        if (performance.now() / 1000 - gameOverTime < GAME_OVER_LOCKOUT) return;
        // Return to lobby
        lobbyState = 'lobby'; mySlotIndex = -1; cfg = null;
        for (var si = 0; si < 12; si++) { slots[si].peerId = null; slots[si].ready = false; slots[si].progress = 0; slots[si].holding = false; }
        gameBirds = []; aiBirds = []; dBirds = []; dRiders = []; fTexts = [];
        return;
      }
      if (lobbyState === 'game') {
        var anyFlap = false;
        for (var i = 0; i < e.touches.length; i++) {
          var zones = getTouchZones(e.touches[i].clientX, e.touches[i].clientY);
          if (zones.l) { keys.l = true; touchZoneFlash.l = 0.3; }
          if (zones.r) { keys.r = true; touchZoneFlash.r = 0.3; }
          if (zones.f) { anyFlap = true; touchZoneFlash.f = 0.3; }
        }
        if (anyFlap) { flapEdge = true; keys.flap = true; }
      }
    }, { passive: false });

    canvas.addEventListener('touchend', function (e) {
      if (lobbyState === 'lobby' || lobbyState === 'countdown') {
        if (touchHolding) { touchHolding = false; releaseHold(); }
        return;
      }
      if (lobbyState === 'game') {
        keys.l = false; keys.r = false; keys.flap = false;
      }
    });

    // Helper: convert client (CSS) coords to game coords
    function clientToGame(cx, cy) {
      var rect = canvas.getBoundingClientRect();
      // Convert CSS coords to canvas pixel coords
      var px = (cx - rect.left) * (canvas.width / rect.width);
      var py = (cy - rect.top) * (canvas.height / rect.height);
      // Then canvas pixels to game coords (same transform as renderLobby)
      var scX = canvas.width / GW, scY = canvas.height / GH, sc = Math.min(scX, scY);
      var oX = (canvas.width - GW * sc) / 2, oY = (canvas.height - GH * sc) / 2;
      return { x: (px - oX) / sc, y: (py - oY) / sc };
    }
    function isInWebrtcHit(gx, gy) {
      if (!webrtcHitBox) return false;
      var b = webrtcHitBox;
      return gx >= b.x && gx <= b.x + b.w && gy >= b.y && gy <= b.y + b.h;
    }

    // Mouse: hover detection for WebRTC title text
    canvas.addEventListener('mousemove', function (e) {
      if (lobbyState !== 'lobby' && lobbyState !== 'countdown') { webrtcHover = false; webrtcTooltip = false; canvas.style.cursor = ''; return; }
      var g = clientToGame(e.clientX, e.clientY);
      var hit = isInWebrtcHit(g.x, g.y);
      webrtcHover = hit;
      // Desktop: hovering over "WebRTC" text shows the tooltip; moving off hides it.
      webrtcTooltip = hit;
      canvas.style.cursor = hit ? 'pointer' : '';
    });
    canvas.addEventListener('mouseleave', function () {
      webrtcHover = false; webrtcTooltip = false; canvas.style.cursor = '';
    });

    // Click: open Wikipedia on desktop if clicking WebRTC text
    canvas.addEventListener('click', function (e) {
      if (lobbyState !== 'lobby' && lobbyState !== 'countdown') return;
      var g = clientToGame(e.clientX, e.clientY);
      if (isInWebrtcHit(g.x, g.y)) {
        window.open('https://en.wikipedia.org/wiki/WebRTC', '_blank');
      }
    });

    // ============================================================
    // CANVAS RESIZE
    // ============================================================
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

    // ============================================================
    // MAIN GAME LOOP
    // ============================================================
    function gameLoop(now) {
      if (!lastTime) lastTime = now;
      var dt = (now - lastTime) / 1000;
      lastTime = now;
      if (dt > 0.05) dt = 0.05;
      if (dt < 0.001) dt = 0.001;

      if (lobbyState === 'lobby') {
        updateHold();
        updateHoldP2();
        renderLobby();
      }
      else if (lobbyState === 'countdown') {
        updateHold();
        updateHoldP2();
        updateCountdown(dt);
        renderLobby();
      }
      else if (lobbyState === 'game') {
        // Send input to host
        sendInputToHost();
        // Decay touch zone flash timers
        if (touchZoneFlash.l > 0) touchZoneFlash.l -= dt * 2;
        if (touchZoneFlash.r > 0) touchZoneFlash.r -= dt * 2;
        if (touchZoneFlash.f > 0) touchZoneFlash.f -= dt * 2;
        for (var zk in touchZoneFlash6) { if (touchZoneFlash6[zk] > 0) touchZoneFlash6[zk] -= dt * 2; }

        // Run physics (host runs authoritative, non-host runs local prediction for own bird)
        if (isHost) {
          gameStep(dt);
          // Broadcast state at 20Hz
          lastHostBroadcast += dt;
          if (lastHostBroadcast >= HOST_BROADCAST_INTERVAL) {
            hostBroadcastState();
            lastHostBroadcast = 0;
          }
        } else {
          // Non-host: run FULL game engine locally for responsiveness
          // Host state corrections are applied smoothly via applyHostState
          gameStep(dt);
          // Apply steering offsets with exponential decay (ported from Xcode)
          for (var si2 = 0; si2 < gameBirds.length; si2++) {
            var sb = gameBirds[si2];
            var spid = sb.peerId || ('b' + si2);
            var so = steeringOffsets[spid];
            if (so && (Math.abs(so.dx) > 0.5 || Math.abs(so.dy) > 0.5)) {
              sb.x += so.dx * dt * 8;
              sb.y += so.dy * dt * 8;
              so.dx *= 0.88; so.dy *= 0.88; // decay ~5 frame half-life
            }
          }
        }

        renderGame();
      }
      else if (lobbyState === 'gameover') {
        renderGame();
      }
      else if (lobbyState === 'observer') {
        // Observer: update lava/platforms for rendering, no physics
        if (cfg) {
          updateLava(dt);
          updateImpactWaves(dt);
          for (var i = 0; i < plats.length; i++) plats[i].update(dt);
        }
        // If no state received for 5 seconds, host is gone — return to lobby
        if (lastStateRecvTime > 0 && (performance.now() / 1000) - lastStateRecvTime > 5) {
          console.log('Observer: no state for 5s — returning to lobby');
          lobbyState = 'lobby'; mySlotIndex = -1; cfg = null;
          for (var si = 0; si < 12; si++) { slots[si].peerId = null; slots[si].ready = false; slots[si].progress = 0; slots[si].holding = false; }
          gameBirds = []; aiBirds = []; dBirds = []; dRiders = []; fTexts = [];
        }
        renderGame();
        // Draw OBSERVER overlay
        var scX = canvas.width / GW, scY = canvas.height / GH, sc = Math.min(scX, scY);
        var oX = (canvas.width - GW * sc) / 2, oY = (canvas.height - GH * sc) / 2;
        ctx.save(); ctx.translate(oX, oY); ctx.scale(sc, sc);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.font = 'bold 120px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('OBSERVER', GW / 2, GH / 2);
        ctx.font = '28px monospace'; ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillText('Game in progress — waiting for next round', GW / 2, GH / 2 + 80);
        ctx.restore();
      }

      // Periodic game logging (every second)
      if ((lobbyState === 'game' || lobbyState === 'gameover') && Math.floor(gameTime) !== Math.floor(gameTime - dt) && gameTime > 0.5) {
        var birdInfo = gameBirds.map(function(b) { return { pid: b.peerId ? b.peerId.slice(0,4) : '?', x: Math.round(b.x), y: Math.round(b.y), st: b.st, alive: b.alive, resp: b.resp, lv: playerLives[b.peerId]||0 }; });
        console.log('GAME', JSON.stringify({ t: gameTime.toFixed(1), wave: wave, host: isHost, birds: birdInfo, ai: aiBirds.length, db: dBirds.length, dr: dRiders.length, stSent: statesSent, stRecv: statesReceived, inSent: inputsSent, inRecv: inputsReceived }));
        // Full entity dump every 5 seconds
        if (Math.floor(gameTime) % 5 === 0) {
          var aiInfo = aiBirds.map(function(b) { return { x: Math.round(b.x), y: Math.round(b.y), st: b.st, alive: b.alive, mode: b.aiMode, hasR: !!b.rider }; });
          var drInfo = dRiders.map(function(r) { return { x: Math.round(r.x), y: Math.round(r.y), st: r.st, alive: r.alive, isP: r.isP }; });
          var dbInfo = dBirds.map(function(b) { return { x: Math.round(b.x), y: Math.round(b.y), alive: b.alive }; });
          var platInfo = plats.map(function(p) { return { id: p.id, w: Math.round(p.w), alive: p.alive }; });
          console.log('DUMP', JSON.stringify({ t: gameTime.toFixed(1), pLives: playerLives, pScores: playerScores, ai: aiInfo, dr: drInfo, db: dbInfo, plats: platInfo }));
        }
      }
      hud.textContent = BUILD + ' | ' + myPeerId.slice(0, 4) + ' | ' + (isHost ? 'HOST' : 'client') + ' | ' + lobbyState;
      requestAnimationFrame(gameLoop);
    }

    // ============================================================
    // INIT
    // ============================================================
    function init() {
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      // Run benchmark
      myBenchmark = runBenchmark();
      console.log('Benchmark score:', myBenchmark);

      // QR code — plain URL, no room parameter (server groups by LAN automatically)
      console.log('Room: auto (LAN)');
      var qrUrl = 'https://erd.mmec.ca/gm3/';
      qrCanvas = generateQR(qrUrl);

      // Connect to signaling server
      connectSignaling();

      // Start game loop
      requestAnimationFrame(gameLoop);
    }

    init();
  </script> </body> </html>
