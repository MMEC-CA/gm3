      }

      // Format info and dark module

      // Encode data into remaining cells using a deterministic pattern
      // For the specific URL, encode bytes and spread across available cells
      var bytes = [];
      for (var i = 0; i < data.length; i++) bytes.push(data.charCodeAt(i));

      // Add mode indicator, length, and data

      // Byte mode indicator: 0100

      // Character count (8 bits for version 2 byte mode)
      var len = data.length;
      for (var b = 7; b >= 0; b--) bits.push((len >> b) & 1);
      // Data bytes
      for (var i = 0; i < bytes.length; i++) {
        for (var b = 7; b >= 0; b--) bits.push((bytes[i] >> b) & 1);

      var bitIdx = 0;
      var reserved = [];
      for (var i = 0; i < size; i++) {
        reserved[i] = [];
        for (var j = 0; j < size; j++) reserved[i][j] = false;
      }

        for (var r = r1; r <= r2; r++) for (var c = c1; c <= c2; c++) {
          if (r >= 0 && r < size && c >= 0 && c < size) reserved[r][c] = true;
        }
      }
      markRect(0, 0, 8, 8);
      markRect(0, size - 8, 8, size - 1);
      markRect(size - 8, 0, size - 1, 8);
      markRect(16, 16, 20, 20); // alignment
      for (var i = 0; i < size; i++) { reserved[6][i] = true; reserved[i][6] = true; } // timing

    var playerNextExtra = {}; // per-player extra life thresholds
    function formatScore(n) {

    // ============================================================
    // SIGNALING VIA WEBSOCKET (Durable Object)
    // ============================================================
    function connectSignaling() {
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      var wsUrl = proto + '//' + location.host + '/gm3/api/signal/ws?peerId=' + myPeerId;
      console.log('Connecting to signaling:', wsUrl);
      hud.textContent = 'Connecting to signaling...';

      sigSocket = new WebSocket(wsUrl);

      sigSocket.onopen = function () {
        console.log('Signaling WebSocket connected');
        hud.textContent = 'Connected as ' + myPeerId.slice(0, 4);
      };

      sigSocket.onmessage = function (e) {
        try {
          var msg = JSON.parse(e.data);
          handleSignalingMessage(msg);
        } catch (err) {
          console.error('Bad signaling message:', err);
        }
      };

      sigSocket.onclose = function () {
        console.log('Signaling WebSocket closed, reconnecting in 5s...');
        sigSocket = null;
        sigReconnectTimer = setTimeout(connectSignaling, 5000);
      };

      sigSocket.onerror = function (e) {
        console.error('Signaling WebSocket error:', e);
      };
    }

    function sendSignal(targetPeerId, signalData) {
      if (sigSocket && sigSocket.readyState === WebSocket.OPEN) {
        sigSocket.send(JSON.stringify({
          type: 'signal',
          to: targetPeerId,
          signal: signalData
        }));
      }
    }

    function handleSignalingMessage(msg) {
      if (msg.type === 'peers') {
        console.log('Room peers:', msg.peers);
        for (var i = 0; i < msg.peers.length; i++) {
          var peerId = msg.peers[i];
          if (peerId !== myPeerId && !peerConnections[peerId]) {
            if (myPeerId < peerId) {
              connectToPeer(peerId, true);
            }
          }
        }
      } else if (msg.type === 'peer-joined') {
        console.log('Peer joined:', msg.peerId);
        if (msg.peerId !== myPeerId && !peerConnections[msg.peerId]) {
          if (myPeerId < msg.peerId) {
            connectToPeer(msg.peerId, true);
          }
        }
      } else if (msg.type === 'peer-left') {
        console.log('Peer left:', msg.peerId);
        removePeer(msg.peerId);
      } else if (msg.type === 'signal') {
        handleWebRTCSignal(msg.from, msg.signal);
      }
    }

    function handleWebRTCSignal(peerId, signal) {
      if (signal.type === 'offer') {
        if (!peerConnections[peerId]) {
          connectToPeer(peerId, false);
        }
        var pc = peerConnections[peerId];
        pc.setRemoteDescription(new RTCSessionDescription(signal)).then(function () {
          return pc.createAnswer();
        }).then(function (answer) {
          return pc.setLocalDescription(answer);
        }).then(function () {
          sendSignal(peerId, pc.localDescription);
          flushCandidates(peerId);
        });
      } else if (signal.type === 'answer') {
        var pc = peerConnections[peerId];
        if (pc) {
          pc.setRemoteDescription(new RTCSessionDescription(signal)).then(function () {
            flushCandidates(peerId);
          });
        }
      } else if (signal.candidate !== undefined) {
        var pc = peerConnections[peerId];
        if (pc && pc.remoteDescription) {
          pc.addIceCandidate(new RTCIceCandidate(signal));
        } else {
          if (!pendingCandidates[peerId]) pendingCandidates[peerId] = [];
          pendingCandidates[peerId].push(signal);
        }
      }
    }

    function flushCandidates(peerId) {
      var pc = peerConnections[peerId];
      var pending = pendingCandidates[peerId];
      if (pc && pc.remoteDescription && pending) {
        for (var i = 0; i < pending.length; i++) {
          pc.addIceCandidate(new RTCIceCandidate(pending[i]));
        }
        delete pendingCandidates[peerId];
      }
    }

    // ============================================================
    // WEBRTC
    // ============================================================
    function connectToPeer(peerId, isInitiator) {
      if (peerConnections[peerId]) return;

      var pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
      });
      peerConnections[peerId] = pc;

      pc.onicecandidate = function (e) {
        if (e.candidate) {
          sendSignal(peerId, e.candidate.toJSON());
        }
      };

      pc.onconnectionstatechange = function () {
        console.log('Peer ' + peerId.slice(0,4) + ' connection: ' + pc.connectionState);
        if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
          removePeer(peerId);
        }
      };
      pc.oniceconnectionstatechange = function () {
        console.log('Peer ' + peerId.slice(0,4) + ' ICE: ' + pc.iceConnectionState);
      };

      if (isInitiator) {
        var dc = pc.createDataChannel('game', { ordered: false, maxRetransmits: 0 });
        setupDataChannel(dc, peerId);
        pc.createOffer().then(function (offer) {
          return pc.setLocalDescription(offer);
        }).then(function () {
          sendSignal(peerId, pc.localDescription);
        });
      } else {
        pc.ondatachannel = function (e) {
          setupDataChannel(e.channel, peerId);
        };
      }
    }

    function setupDataChannel(dc, peerId) {
      function onChannelReady() {
        dataChannels[peerId] = dc;
        connectedPeerIds[peerId] = true;
        console.log('Data channel open with', peerId, '(readyState=' + dc.readyState + ')');
        // Send lobby-join to new peer
        sendToPeer(peerId, {
          type: 'lobby-join',
          peerId: myPeerId,
          slotIndex: mySlotIndex,
          deviceInfo: myDeviceInfo,
          benchmarkScore: myBenchmark
        });
        // If we have state, send lobby-sync
        if (mySlotIndex >= 0) {
          sendToPeer(peerId, {
            type: 'lobby-sync',
            slots: serializeSlots(),
            level: selectedLevel,
            lobbyState: lobbyState
          });
        }
      }

      // Channel may already be open (common for responder side)
      if (dc.readyState === 'open') {
        onChannelReady();
      }
      dc.onopen = function () {
        onChannelReady();
      };

      dc.onclose = function () {
        removePeer(peerId);
      };

      dc.onmessage = function (e) {
        try {
          var msg = JSON.parse(e.data);
          handleDataMessage(peerId, msg);
        } catch (err) { }
      };
    }

    function removePeer(peerId) {
      if (peerConnections[peerId]) {
        peerConnections[peerId].close();
        delete peerConnections[peerId];
      }
      delete dataChannels[peerId];
      delete connectedPeerIds[peerId];
      delete remoteInputs[peerId];
      // Remove from slot
      for (var i = 0; i < 12; i++) {
        if (slots[i].peerId === peerId) {
          slots[i].peerId = null;
          slots[i].deviceInfo = '';
          slots[i].benchmarkScore = 0;
          slots[i].progress = 0;
          slots[i].ready = false;
          slots[i].holding = false;
        }
      }
      // Remove bird in game
      gameBirds = gameBirds.filter(function (b) { return b.peerId !== peerId; });
      determineHost();
      // If all peers gone while in game/observer, return to lobby
      var peerCount = 0;
      for (var p in connectedPeerIds) peerCount++;
      if (peerCount === 0 && (lobbyState === 'game' || lobbyState === 'observer' || lobbyState === 'gameover')) {
        console.log('All peers disconnected — returning to lobby');
        lobbyState = 'lobby'; mySlotIndex = -1; cfg = null;
        for (var si = 0; si < 12; si++) { slots[si].peerId = null; slots[si].ready = false; slots[si].progress = 0; slots[si].holding = false; }
        gameBirds = []; aiBirds = []; dBirds = []; dRiders = []; fTexts = [];
      }
    }

    var MAX_BUFFER = 16384; // 16KB — skip sends if buffer exceeds this
    function broadcast(msg) {
      var data = JSON.stringify(msg);
      for (var pid in dataChannels) {
        var dc = dataChannels[pid];
        if (dc && dc.readyState === 'open' && dc.bufferedAmount < MAX_BUFFER) {
          dc.send(data);
        }
      }
    }

    function sendToPeer(peerId, msg) {
      var dc = dataChannels[peerId];
      if (dc && dc.readyState === 'open' && dc.bufferedAmount < MAX_BUFFER) {
        dc.send(JSON.stringify(msg));
      }
    }

    function serializeSlots() {
      var out = [];
      for (var i = 0; i < 12; i++) {
        out.push({
          peerId: slots[i].peerId,
          deviceInfo: slots[i].deviceInfo,
          benchmarkScore: slots[i].benchmarkScore,
          progress: slots[i].progress,
          ready: slots[i].ready,
          holding: slots[i].holding
        });
      }
      return out;
    }

    // ============================================================
    // DATA MESSAGE HANDLING
    // ============================================================
    function handleDataMessage(fromPeerId, msg) {
      if (msg.type === 'lobby-join') {
        // Peer wants to join a slot
        var si = msg.slotIndex;
        if (si >= 0 && si < 12 && (slots[si].peerId === null || slots[si].peerId === msg.peerId)) {
          slots[si].peerId = msg.peerId;
          slots[si].deviceInfo = msg.deviceInfo || '';
          slots[si].benchmarkScore = msg.benchmarkScore || 0;
        }
        determineHost();
      }
      else if (msg.type === 'lobby-sync') {
        // Full state sync from existing peer
        if (msg.slots) {
          for (var i = 0; i < 12 && i < msg.slots.length; i++) {
            var s = msg.slots[i];
            if (s.peerId && s.peerId !== myPeerId) {
              slots[i].peerId = s.peerId;
              slots[i].deviceInfo = s.deviceInfo;
              slots[i].benchmarkScore = s.benchmarkScore;
              slots[i].progress = s.progress;
              slots[i].ready = s.ready;
              slots[i].holding = s.holding;
            }
          }
        }
        if (msg.level) selectedLevel = msg.level;
        if (msg.lobbyState === 'game' || msg.lobbyState === 'gameover') {
          // Late joiner during active game — enter observer mode
          lobbyState = 'observer';
        }
        determineHost();
      }
      else if (msg.type === 'lobby-hold') {
        var si = findSlotByPeer(msg.peerId);
        if (si >= 0) {
          slots[si].holding = true;
          slots[si].progress = msg.progress || 0;
        }
      }
      else if (msg.type === 'lobby-ready') {
        var si = findSlotByPeer(msg.peerId);
        if (si >= 0) {
          slots[si].ready = true;
          slots[si].progress = 100;
          slots[si].holding = false;
          checkCountdownStart();
        }
      }
      else if (msg.type === 'lobby-allready') {
        // Remote player triggered all-join: ready all occupied slots
        for (var i = 0; i < 12; i++) {
          if (slots[i].peerId !== null && !slots[i].ready) {
            slots[i].ready = true;
            slots[i].progress = 100;
            slots[i].holding = false;
          }
        }
        checkCountdownStart();
      }
      else if (msg.type === 'lobby-release') {
        var si = findSlotByPeer(msg.peerId);
        if (si >= 0) {
          slots[si].holding = false;
          slots[si].progress = 0;
          slots[si].ready = false;
        }
      }
      else if (msg.type === 'lobby-level') {
        selectedLevel = msg.level;
      }
      else if (msg.type === 'game-start') {
        if (lobbyState !== 'observer') startGame(msg);
      }
      else if (msg.type === 'gameover') {
        if (lobbyState === 'observer') {
          lobbyState = 'lobby'; mySlotIndex = -1; cfg = null;
          for (var si = 0; si < 12; si++) { slots[si].peerId = null; slots[si].ready = false; slots[si].progress = 0; slots[si].holding = false; }
          gameBirds = []; aiBirds = []; dBirds = []; dRiders = []; fTexts = [];
        } else if (lobbyState === 'game') {
          lobbyState = 'gameover';
          gameOverTime = performance.now() / 1000;
          if (msg.pScores) playerScores = msg.pScores;
          var nPlayersGOr = msg.pScores ? Object.keys(msg.pScores).length : 0;
          fTexts.push({ text: 'GAME OVER', x: GW / 2, y: GH * 0.6, life: 999, size: 120, stat: true, go: 'main' });
          if (nPlayersGOr > 1) {
            if (msg.winnerPid === myPeerId) {
              fTexts.push({ text: 'YOU ARE WINNER!', x: GW / 2, y: GH * 0.45, life: 999, size: 56, stat: true, go: 'main' });
            } else {
              fTexts.push({ text: (msg.winnerName || '?') + ' wins!', x: GW / 2, y: GH * 0.45, life: 999, size: 56, stat: true, go: 'main' });
            }
          }
          fTexts.push({ text: 'FLAP TO RETURN TO LOBBY', x: GW / 2, y: GH * 0.5, life: 999, size: 40, stat: true, go: 'prompt' });
          playTone(440, 0.2, 0.3); setTimeout(function () { playTone(330, 0.2, 0.3); }, 200);
          setTimeout(function () { playTone(220, 0.4, 0.25); }, 400);
        }
      }
      else if (msg.type === 'input') {
        // Non-host sent input to host
        if (isHost) {
          inputsReceived++;
          var prev = remoteInputs[msg.peerId];
          // Accumulate flapEdge: once set, keep it until gameStep consumes it
          var fe = msg.flapEdge || (prev && prev.flapEdge);
          remoteInputs[msg.peerId] = { l: msg.keys.l, r: msg.keys.r, flap: msg.keys.flap, dn: msg.keys.dn, flapEdge: fe };
        }
      }
      else if (msg.type === 'state') {
        // Host broadcast game state
        if (!isHost) {
          statesReceived++;
          // Observer: initialize game state on first state message
          if (lobbyState === 'observer' && !cfg && msg.wave) {
            cfg = makeLevel(msg.wave);
            wave = msg.wave;
            plats = cfg.platforms.map(function(p) { return new Plat(p.id, p.x, p.y, p.w, cfg.sf); });
            gameBirds = []; aiBirds = []; dBirds = []; dRiders = []; fTexts = [];
            lavaPeaks = []; lavaSources = []; lavaBaseH = 0; lavaBaseTarget = 0; lavaH = null;
            if (cfg.lava) { lavaBaseH = cfg.lava.baseH; lavaBaseTarget = cfg.lava.baseH; addLavaSources(wave, cfg.lava.waves); }
          }
          // Packet ordering: drop stale/duplicate state packets
          if (msg.tick !== undefined) {
            if (msg.tick <= lastStateTick) return; // stale packet — drop
            lastStateTick = msg.tick;
          }
          lastStateRecvTime = performance.now() / 1000;
          if (cfg) applyHostState(msg);
        }
      }
    }

    function findSlotByPeer(peerId) {
      for (var i = 0; i < 12; i++) {
        if (slots[i].peerId === peerId) return i;
      }
      return -1;
    }

    // ============================================================
    // HOST DETERMINATION
    // ============================================================
    function determineHost() {
      var bestScore = -1;
      var bestPeer = null;
      // Include self
      if (mySlotIndex >= 0) {
        bestScore = myBenchmark;
        bestPeer = myPeerId;
      }
      for (var i = 0; i < 12; i++) {
        var s = slots[i];
        if (!s.peerId) continue;
        if (s.benchmarkScore > bestScore || (s.benchmarkScore === bestScore && s.peerId < bestPeer)) {
          bestScore = s.benchmarkScore;
          bestPeer = s.peerId;
        }
      }
      hostPeerId = bestPeer;
      isHost = (bestPeer === myPeerId);
    }

    // ============================================================
    // LOBBY MECHANICS
    // ============================================================
    var holdingFlap = false;
    var holdStartTime = 0;
    // Rapid-tap all-join: 8 quick taps from a slotted player readies all occupied slots
    var rapidTapCount = 0;
    var rapidTapLast = 0;
    var RAPID_TAP_WINDOW = 400; // ms between taps to count as rapid
    var RAPID_TAP_THRESHOLD = 8;

    function claimSlot() {
      if (mySlotIndex >= 0) return; // already claimed
      for (var i = 0; i < 12; i++) {
        if (slots[i].peerId === null) {
          mySlotIndex = i;
          slots[i].peerId = myPeerId;
          slots[i].deviceInfo = myDeviceInfo;
          slots[i].benchmarkScore = myBenchmark;
          // Broadcast join
          broadcast({
            type: 'lobby-join',
            peerId: myPeerId,
            slotIndex: mySlotIndex,
            deviceInfo: myDeviceInfo,
            benchmarkScore: myBenchmark
          });
          determineHost();
          return;
        }
      }
    }

    // Claim a second local slot for WASD player (keyboard devices only)
    function claimLocalPlayer2() {
      if (hasLocalPlayer2) return;
      if (!(/Mac|Win|Linux/.test(navigator.userAgent))) return; // only keyboard devices
      for (var i = 0; i < 12; i++) {
        if (slots[i].peerId === null) {
          localPlayer2PeerId = myPeerId + '-p2';
          localPlayer2SlotIndex = i;
          hasLocalPlayer2 = true;
          slots[i].peerId = localPlayer2PeerId;
          slots[i].deviceInfo = 'WASD (local)';
          slots[i].benchmarkScore = myBenchmark;
          broadcast({
            type: 'lobby-join',
            peerId: localPlayer2PeerId,
            slotIndex: localPlayer2SlotIndex,
            deviceInfo: 'WASD (local)',
            benchmarkScore: myBenchmark
          });
          return;
        }
      }
    }

    var holdingFlapP2 = false, holdStartTimeP2 = 0;
    function startHoldP2() {
      if (lobbyState !== 'lobby' || mySlotIndex < 0) return;
      // Claim P2 slot on first press (so it shows in lobby)
      if (!hasLocalPlayer2) claimLocalPlayer2();
      if (!hasLocalPlayer2) return;
      if (slots[localPlayer2SlotIndex].ready) return;
      holdingFlapP2 = true;
      holdStartTimeP2 = performance.now();
      slots[localPlayer2SlotIndex].holding = true;
    }
    function updateHoldP2() {
      if (!holdingFlapP2 || !hasLocalPlayer2 || localPlayer2SlotIndex < 0) return;
      if (slots[localPlayer2SlotIndex].ready) return;
      var elapsed = (performance.now() - holdStartTimeP2) / 1000;
      var progress = Math.min(100, (elapsed / HOLD_DURATION) * 100);
      slots[localPlayer2SlotIndex].progress = progress;
      broadcast({ type: 'lobby-hold', peerId: localPlayer2PeerId, progress: progress });
      if (progress >= 100) {
        slots[localPlayer2SlotIndex].ready = true;
        slots[localPlayer2SlotIndex].holding = false;
        holdingFlapP2 = false;
        broadcast({ type: 'lobby-ready', peerId: localPlayer2PeerId });
        checkCountdownStart();
      }
    }
    function releaseHoldP2() {
      if (!holdingFlapP2) return;
      holdingFlapP2 = false;
      if (hasLocalPlayer2 && localPlayer2SlotIndex >= 0) {
        slots[localPlayer2SlotIndex].holding = false;
        slots[localPlayer2SlotIndex].progress = 0;
        broadcast({ type: 'lobby-release', peerId: localPlayer2PeerId });
      }
    }

    function startHold() {
      if (lobbyState !== 'lobby') return;
      if (mySlotIndex < 0) claimSlot();
      if (mySlotIndex < 0) return; // no slot available
      // Rapid-tap detection: 8 quick taps readies all occupied slots
      var now = performance.now();
      if (now - rapidTapLast < RAPID_TAP_WINDOW) {
        rapidTapCount++;
      } else {
        rapidTapCount = 1;
      }
      rapidTapLast = now;
      if (rapidTapCount >= RAPID_TAP_THRESHOLD && mySlotIndex >= 0) {
        // All-join: ready all occupied slots EXCEPT unready local P2 (must hold W deliberately)
        for (var i = 0; i < 12; i++) {
          if (slots[i].peerId !== null && !slots[i].ready) {
            if (hasLocalPlayer2 && slots[i].peerId === localPlayer2PeerId) continue; // skip P2
            slots[i].ready = true;
            slots[i].progress = 100;
            slots[i].holding = false;
          }
        }
        broadcast({ type: 'lobby-allready', peerId: myPeerId });
        rapidTapCount = 0;
        holdingFlap = false;
        checkCountdownStart();
        return;
      }
      if (slots[mySlotIndex].ready) return; // already ready
      holdingFlap = true;
      holdStartTime = performance.now();
      slots[mySlotIndex].holding = true;
    }

    function updateHold() {
      if (!holdingFlap || mySlotIndex < 0) return;
      if (slots[mySlotIndex].ready) return;
      var elapsed = (performance.now() - holdStartTime) / 1000;
      var progress = Math.min(100, (elapsed / HOLD_DURATION) * 100);
      slots[mySlotIndex].progress = progress;
      // Broadcast hold progress periodically
      broadcast({
        type: 'lobby-hold',
        peerId: myPeerId,
        progress: progress
      });
      if (progress >= 100) {
        slots[mySlotIndex].ready = true;
        slots[mySlotIndex].holding = false;
        holdingFlap = false;
        broadcast({
          type: 'lobby-ready',
          peerId: myPeerId
        });
        checkCountdownStart();
      }
    }

    function releaseHold() {
      if (!holdingFlap) return;
      holdingFlap = false;
      if (mySlotIndex >= 0 && !slots[mySlotIndex].ready) {
        slots[mySlotIndex].holding = false;
        slots[mySlotIndex].progress = 0;
        broadcast({
          type: 'lobby-release',
          peerId: myPeerId
        });
      }
    }

    function checkCountdownStart() {
      if (lobbyState !== 'lobby') return;
      var anyReady = false;
      for (var i = 0; i < 12; i++) {
        if (slots[i].ready) { anyReady = true; break; }
      }
      if (anyReady) {
        lobbyState = 'countdown';
        countdownStart = performance.now();
        countdownTimer = COUNTDOWN_DURATION;
        for (var i = 0; i < 12; i++) prevHolding[i] = slots[i].holding;
      }
    }

    function updateCountdown(dt) {
      if (lobbyState !== 'countdown') return;
      // Reset only on *new* flap (transition from not-holding to holding),
      // not while a player keeps holding from before.
      var newFlapStarted = false;
      for (var i = 0; i < 12; i++) {
        if (slots[i].holding && !prevHolding[i]) newFlapStarted = true;
        prevHolding[i] = slots[i].holding;
      }
      if (newFlapStarted) {
        countdownStart = performance.now();
        countdownTimer = COUNTDOWN_DURATION;
        return;
      }
      countdownTimer -= dt;
      if (countdownTimer <= 0) {
        // Start game!
        if (isHost) {
          var readySlots = [];
          for (var i = 0; i < 12; i++) {
            if (slots[i].ready) readySlots.push({ slotIndex: i, peerId: slots[i].peerId });
          }
          var startMsg = {
            type: 'game-start',
            level: selectedLevel,
            hostPeerId: myPeerId,
            playerSlots: readySlots
          };
          broadcast(startMsg);
          startGame(startMsg);
        }
      }
    }

    function changeLevel(dir) {
      if (lobbyState !== 'lobby') return;
      // Disabled while anyone is holding
      for (var i = 0; i < 12; i++) {
        if (slots[i].holding) return;
      }
      selectedLevel = Math.max(1, Math.min(100, selectedLevel + dir));
      broadcast({ type: 'lobby-level', level: selectedLevel });
    }

    // ============================================================
    // GAME START
    // ============================================================
    function startGame(msg) {
      lobbyState = 'game';
      cfg = makeLevel(msg.level);
      hostPeerId = msg.hostPeerId;
      isHost = (msg.hostPeerId === myPeerId);
      gameTime = 0;
      gameTick = 0;
      lastHostBroadcast = 0;
      wave = msg.level;
      score = 0; lives = START_LIVES; nextExtra = EXTRA1;
      killStreak = 0; streakTimer = 0;
      rainDrops = [];
      playerLives = {}; playerScores = {};

      // Create birds for each ready player
      gameBirds = [];
      aiBirds = []; dBirds = []; spawnQueue = []; dbTimer = 0;
      dRiders = [];
      fTexts = [];
      sparks = [];
      lavaPeaks = []; lavaSources = []; lavaBaseH = 0; lavaBaseTarget = 0; lavaH = null;
      lavaBubbles = []; lavaEruptions = []; lavaImpactWaves = [];

      var playerSlots = msg.playerSlots || [];
      for (var pi = 0; pi < playerSlots.length; pi++) {
        var ps = playerSlots[pi];
        var si = ps.slotIndex;
        var color = SLOT_COLORS[si].hex;
        var spawnX = GW * 0.2 + (pi / Math.max(1, playerSlots.length - 1)) * GW * 0.6;
        if (playerSlots.length === 1) spawnX = GW / 2;
        var spawnY = GH * 0.7;
        var b = new Bird('player', spawnX, spawnY, cfg.sf, color);
        b.peerId = ps.peerId;
        b.slotIndex = si;
        b.origCol = color; // preserve for HUD display
        b.rider = new Rider(true, 1.0, cfg.sf, color);
        b.rider.mounted = true;
        b.rider.ownerPeerId = ps.peerId;
        gameBirds.push(b);
        playerLives[ps.peerId] = START_LIVES;
        playerScores[ps.peerId] = 0;
      }

      // Now call setupWave which sets up platforms, AI queue, lava, etc.
      setupWave(msg.level, false);

      fTexts.push({ text: getLevelTitle(msg.level), x: GW / 2, y: GH * 0.35, life: 3.0 });
      var sub = getLevelSubtitle(msg.level);
      if (sub) fTexts.push({ text: sub, x: GW / 2, y: GH * 0.42, life: 2.5 });
    }

    // ============================================================
    // GAME PHYSICS (host-authoritative)
    // ============================================================
    function gameStep(dt) {
      if (!cfg) return; // not initialized yet
      gameTime += dt;
      gameTick++;

      // Apply inputs to player birds (include resp birds so they can drop in)
      for (var i = 0; i < gameBirds.length; i++) {
        var bird = gameBirds[i];
        if (!bird.alive && !bird.resp) continue;

        // Gather input from bird owner + all passengers (shared control)
        var input = null;
        if (bird.peerId === myPeerId) {
          input = { l: keys.l, r: keys.r, flap: keys.flap, dn: keys.dn, flapEdge: flapEdge };
        } else if (hasLocalPlayer2 && bird.peerId === localPlayer2PeerId) {
          input = { l: keys2.l, r: keys2.r, flap: keys2.flap, dn: keys2.dn, flapEdge: flapEdge2 };
        } else if (isHost && remoteInputs[bird.peerId]) {
          input = remoteInputs[bird.peerId];
        }
        // Merge passenger inputs (any passenger pressing a direction counts)
        if (bird.passengers && bird.passengers.length > 0) {
          for (var pi = 0; pi < bird.passengers.length; pi++) {
            var passPid = bird.passengers[pi].ownerPeerId;
            var passInput = null;
            if (passPid === myPeerId) passInput = { l: keys.l, r: keys.r, flap: keys.flap, dn: keys.dn, flapEdge: flapEdge };
            else if (hasLocalPlayer2 && passPid === localPlayer2PeerId) passInput = { l: keys2.l, r: keys2.r, flap: keys2.flap, dn: keys2.dn, flapEdge: flapEdge2 };
            else if (isHost && remoteInputs[passPid]) passInput = remoteInputs[passPid];
            if (passInput) {
              if (!input) input = { l: false, r: false, flap: false, dn: false, flapEdge: false };
              if (passInput.l) input.l = true;
              if (passInput.r) input.r = true;
              if (passInput.flap) input.flap = true;
              if (passInput.flapEdge) input.flapEdge = true;
            }
          }
        }

        if (input) {
          if (input.l) bird.mDir = -1;
          else if (input.r) bird.mDir = 1;
          else bird.mDir = 0;

          if (input.flapEdge) {
            // Check if this player has a living dismounted rider — rider jump takes priority
            var hasDismountedRider = false;
            for (var ri = 0; ri < dRiders.length; ri++) {
              if (dRiders[ri].alive && dRiders[ri].ownerPeerId === bird.peerId && !dRiders[ri].mounted) {
                hasDismountedRider = true; break;
              }
            }
            if (hasDismountedRider) {
              // Rider jump (works for both local and remote players)
              for (var ri = 0; ri < dRiders.length; ri++) {
                var r = dRiders[ri];
                if (r.alive && r.ownerPeerId === bird.peerId && !r.mounted) r.jump();
              }
            } else if (bird.resp && bird.respT > RESPAWN_T) {
              // Respawn drop — only when no dismounted rider exists
              bird.resp = false; bird.alive = true; bird.vy = -100;
              if (bird.peerId === myPeerId) ctrlMode = 'bird';
              if (hasLocalPlayer2 && bird.peerId === localPlayer2PeerId) ctrlMode2 = 'bird';
            } else if (!bird.resp) {
              // Normal flap
              bird.doFlap();
            }
          }
        }

        bird.update(dt);
        // Force drop after RESPAWN_FORCE seconds
        if (bird.resp && bird.respT >= RESPAWN_FORCE) {
          bird.resp = false; bird.alive = true; bird.vy = -100;
          if (bird.peerId === myPeerId) ctrlMode = 'bird';
          if (hasLocalPlayer2 && bird.peerId === localPlayer2PeerId) ctrlMode2 = 'bird';
        }
      }

      // Rider jump for players who have no bird in gameBirds
      // (bird got peerId=null when rider was knocked off, no respawn bird yet)
      // Local player 1
      if (flapEdge && ctrlMode === 'rider') {
        var hasBirdInLoop = false;
        for (var bi = 0; bi < gameBirds.length; bi++) { if (gameBirds[bi].peerId === myPeerId) { hasBirdInLoop = true; break; } }
        if (!hasBirdInLoop) {
          for (var ri = 0; ri < dRiders.length; ri++) {
            var r = dRiders[ri];
            if (r.alive && r.ownerPeerId === myPeerId && !r.mounted) r.jump();
          }
        }
      }
      // Local player 2
      if (hasLocalPlayer2 && flapEdge2 && ctrlMode2 === 'rider') {
        var hasP2Bird = false;
        for (var bi = 0; bi < gameBirds.length; bi++) { if (gameBirds[bi].peerId === localPlayer2PeerId) { hasP2Bird = true; break; } }
        if (!hasP2Bird) {
          for (var ri = 0; ri < dRiders.length; ri++) {
            var r = dRiders[ri];
            if (r.alive && r.ownerPeerId === localPlayer2PeerId && !r.mounted) r.jump();
          }
        }
      }
      // Remote players (host only)
      if (isHost) {
        for (var pid in remoteInputs) {
          var ri2 = remoteInputs[pid];
          if (ri2 && ri2.flapEdge) {
            var hasBird2 = false;
            for (var bi = 0; bi < gameBirds.length; bi++) { if (gameBirds[bi].peerId === pid) { hasBird2 = true; break; } }
            if (!hasBird2) {
              for (var ri = 0; ri < dRiders.length; ri++) {
                var r = dRiders[ri];
                if (r.alive && r.ownerPeerId === pid && !r.mounted) r.jump();
              }
            }
          }
        }
      }

      // Clear flapEdge
      flapEdge = false;
      flapEdge2 = false;
      for (var pid in remoteInputs) {
        if (remoteInputs[pid]) remoteInputs[pid].flapEdge = false;
      }

      // Staggered bird spawning from spawnQueue
      for (var si = 0; si < spawnQueue.length; si++) {
        var sq = spawnQueue[si];
        if (!sq.spawned && gameTime >= sq.delay) {
          sq.spawned = true;
          var sx = Math.random() < 0.5 ? -50 : GW + 50;
          var sy = GH * 0.18 + Math.random() * GH * 0.56;
          var ab = new Bird('ai', sx, sy, cfg.sf);
          ab.stam = cfg.stamR[0] + Math.random() * (cfg.stamR[1] - cfg.stamR[0]);
          ab.ch = 0; ab.cs = Math.round(ab.stam * 80); ab.cl = 30 + Math.round(ab.stam * 30);
          ab.col = 'hsl(' + ab.ch + ',' + ab.cs + '%,' + ab.cl + '%)';
          ab.mDir = sx < 0 ? 1 : -1;
          var sk = cfg.skillR[0] + Math.random() * (cfg.skillR[1] - cfg.skillR[0]);
          ab.rider = new Rider(false, sk, cfg.sf);
          aiBirds.push(ab); allB.push(ab);
        }
      }

      // Down arrow: flash/locate player bird
      if (keys.dn && flashTimer <= 0) { flashTimer = 0.9; }
      if (flashTimer > 0) flashTimer -= dt;

      // Rain (levels 5+)
      if (wave >= 5) {
        var rainRate = Math.min(200, (wave - 4) * 15);
        for (var ri = 0; ri < Math.ceil(rainRate * dt); ri++) {
          if (Math.random() < rainRate * dt / Math.ceil(rainRate * dt)) {
            rainDrops.push({ x: Math.random() * GW, y: GH + 10, vy: -800 - Math.random() * 400, vx: -50 - Math.random() * 100, len: 8 + Math.random() * 12 });
          }
        }
        for (var ri = rainDrops.length - 1; ri >= 0; ri--) {
          var rd = rainDrops[ri]; rd.x += rd.vx * dt; rd.y += rd.vy * dt;
          if (rd.y < -20) rainDrops.splice(ri, 1);
        }
        if (rainDrops.length > 500) rainDrops.splice(0, rainDrops.length - 500);
      }

      // Wave start message fade
      if (waveStartT > 0) waveStartT -= dt;

      // Update platforms
      for (var i = 0; i < plats.length; i++) plats[i].update(dt);

      // Update AI birds
      for (var i = 0; i < aiBirds.length; i++) { aiBirds[i].update(dt); updateAI(aiBirds[i], dt); }
      // Update riderless player birds (flee off screen)
      for (var i = 0; i < gameBirds.length; i++) {
        var gb = gameBirds[i];
        if (gb.alive && !gb.rider && gb.aiMode === 'flee') updateAI(gb, dt);
      }

      // Update death birds — slow horizontal drift, contract to burst down toward nearest player
      for (var i = 0; i < dBirds.length; i++) {
        var db = dBirds[i];
        if (db.dying) {
          // Popped — fly off in fling direction, visual only, no AI, no physics updates
          db.dyingT += dt;
          db.x += db.vx * dt; db.y += db.vy * dt;
          db.vy *= Math.pow(0.94, dt * 60); // slight air drag vertical
          if (db.x < -300 || db.x > GW + 300 || db.dyingT > 3) db.alive = false;
          continue;
        }
        db.update(dt);
        var tgt = null, md = 1e9;
        for (var j = 0; j < gameBirds.length; j++) { var p = gameBirds[j]; if (p.alive && !p.resp) { var d = Math.hypot(p.x - db.x, p.y - db.y); if (d < md) { md = d; tgt = p; } } }
        if (tgt) {
          db.mDir = tgt.x > db.x ? 1 : -1;
          // Very gentle horizontal drift — slow-moving blobby menace
          db.vx += db.mDir * 60 / db.mass * dt;
          // Contract occasionally to burst down; more often when target is below
          var below = db.y > tgt.y + 30;
          var chance = below ? 1.6 * dt : 0.3 * dt;
          if (db.contractT <= 0 && Math.random() < chance) db.flapDn();
        }
      }

      // Update dismounted riders
      for (var i = 0; i < dRiders.length; i++) {
        dRiders[i].update(dt);
        // Player riders die after 10 seconds dismounted (triggers respawn)
        var dr = dRiders[i];
        if (isHost && dr.isP && dr.alive && !dr.mounted && dr.dismountTime && gameTime - dr.dismountTime > 10) {
          dr.alive = false;
          // (death text removed — respawn indicator at top is sufficient)
        }
      }

      // Update rescued passengers on birds — carry to heaven, then respawn with +1 life
      for (var bi = 0; bi < gameBirds.length; bi++) {
        var gb = gameBirds[bi];
        if (!gb.passengers || gb.passengers.length === 0) continue;
        for (var pi = gb.passengers.length - 1; pi >= 0; pi--) {
          var passenger = gb.passengers[pi];
          // Position passenger on the bird (stacked above rider)
          passenger.x = gb.x;
          passenger.y = gb.y + gb.h * 0.5 + (pi + 1) * 25;
          // When bird reaches top of screen, passenger delivered to heaven
          if (gb.y > GH * 0.85) {
            var pOwner = passenger.ownerPeerId;
            passenger.alive = false;
            passenger.mounted = false;
            gb.passengers.splice(pi, 1);
            // Create a respawn bird for the rescued player (host only)
            if (pOwner && isHost) {
              var slotColor = '#fff';
              for (var si2 = 0; si2 < 12; si2++) { if (slots[si2].peerId === pOwner) { slotColor = SLOT_COLORS[si2].hex; break; } }
              var rb = new Bird('player', gb.x, GH - 50, cfg.sf, slotColor);
              rb.peerId = pOwner; rb.origCol = slotColor;
              rb.resp = true; rb.respT = -1.0; // 1 second extra delay before can drop
              rb.alive = false;
              rb.rider = new Rider(true, 1.0, cfg.sf, slotColor);
              rb.rider.mounted = true; rb.rider.ownerPeerId = pOwner;
              gameBirds.push(rb);
              fTexts.push({ text: 'DELIVERED!', x: gb.x, y: GH * 0.9, life: 2.5 });
              playTone(1047, 0.2, 0.3);
            }
          }
        }
      }

      // Lava
      updateLava(dt);
      updateImpactWaves(dt);

      // Lava bubbles and eruption splashes (client-only visuals, no network sync needed)
      if (lavaH !== null && lavaH > 5) {
        var bubRate = 0.5 + wave * 0.3;
        if (Math.random() < bubRate * dt) {
          var bx = Math.random() * GW; var bsh = getLavaHeightAt(bx) || lavaBaseH;
          lavaBubbles.push({ x: bx, y: bsh - 5, r: 2 + Math.random() * 4, life: 0.5 + Math.random() * 0.5, maxLife: 0.5 + Math.random() * 0.5 });
        }
        for (var bi = lavaBubbles.length - 1; bi >= 0; bi--) {
          var lb = lavaBubbles[bi]; lb.y += 30 * dt; lb.r += 2 * dt; lb.life -= dt;
          if (lb.life <= 0) lavaBubbles.splice(bi, 1);
        }
        // Lava splash eruptions — multi-particle bursts that arc up from the surface
        var eruptRate = 0.15 + wave * 0.05;
        if (Math.random() < eruptRate * dt) {
          var ex = Math.random() * GW; var esh = getLavaHeightAt(ex) || lavaBaseH;
          var numBlobs = 3 + Math.floor(Math.random() * 5);
          for (var eb = 0; eb < numBlobs; eb++) {
            var angle = (0.3 + Math.random() * 0.4) * Math.PI; // 50-130 degrees upward
            var spd = 150 + Math.random() * 250;
            lavaEruptions.push({
              x: ex + (Math.random() - 0.5) * 10, y: esh,
              vx: Math.cos(angle) * spd * (Math.random() < 0.5 ? 1 : -1),
              vy: Math.sin(angle) * spd,
              r: 2 + Math.random() * 3,
              life: 0.6 + Math.random() * 0.6
            });
          }
        }
        for (var ei = lavaEruptions.length - 1; ei >= 0; ei--) {
          var le = lavaEruptions[ei];
          le.x += (le.vx || 0) * dt;
          le.y += le.vy * dt; le.vy -= 400 * dt; le.life -= dt;
          if (le.life <= 0) lavaEruptions.splice(ei, 1);
        }
      }

      // Update sparks
      for (var si = sparks.length - 1; si >= 0; si--) {
        var sk = sparks[si]; sk.x += sk.vx * dt; sk.y += sk.vy * dt; sk.vy += GRAV_ACCEL * 0.5 * dt; sk.life -= dt;
        if (sk.life <= 0) sparks.splice(si, 1);
      }

      // Kill streak timer
      if (streakTimer > 0) { streakTimer -= dt; if (streakTimer <= 0) killStreak = 0; }

      // Falling off bottom death (host only)
      if (isHost) for (var i = 0; i < allB.length; i++) { var fb = allB[i]; if (fb.alive && fb.y < -200) { if (fb.rider) killRider(fb); fb.alive = false; } }

      // Rebuild allB
      allB = gameBirds.concat(aiBirds, dBirds).filter(function (b) { return b.alive; });

      // Collisions (HOST ONLY — all collision results sync to client via state broadcast)
      if (isHost) checkCollisions();

      // Clean up dead (host only — client gets authoritative lists from applyHostState)
      if (isHost) {
        aiBirds = aiBirds.filter(function (b) { return b.alive; });
        dBirds = dBirds.filter(function (b) { return b.alive; });
        dRiders = dRiders.filter(function (r) { return r.alive && !r.mounted; });
        // Keep bird if: (alive or respawning) AND (still owned by a player OR riderless-fleeing off screen)
        gameBirds = gameBirds.filter(function (b) { return (b.alive || b.resp) && (b.peerId || b.aiMode === 'flee'); });
      }

      // Check if LOCAL player's rider was picked up -> back to bird mode
      if (ctrlMode === 'rider') {
        var myDismounted = false;
        for (var i = 0; i < dRiders.length; i++) { if (dRiders[i].alive && dRiders[i].ownerPeerId === myPeerId && !dRiders[i].mounted) myDismounted = true; }
        if (!myDismounted) ctrlMode = 'bird';
      }

      // Mid-wave respawn: players with lives but no bird AND no living dismounted rider get a new bird
      // HOST ONLY — client gets birds via applyHostState
      if (!isHost) {} else
      for (var pid in playerLives) {
        if (playerLives[pid] <= 0) continue;
        var hasBird = false, hasRider = false;
        for (var i = 0; i < gameBirds.length; i++) { if (gameBirds[i].peerId === pid) { hasBird = true; break; } }
        if (hasBird) continue;
        for (var i = 0; i < dRiders.length; i++) { if (dRiders[i].alive && dRiders[i].ownerPeerId === pid && !dRiders[i].mounted) { hasRider = true; break; } }
        if (hasRider) continue;
        // Check if this player is a rescued passenger on any bird
        var isPassenger = false;
        for (var i = 0; i < gameBirds.length; i++) {
          if (gameBirds[i].passengers) {
            for (var pi = 0; pi < gameBirds[i].passengers.length; pi++) {
              if (gameBirds[i].passengers[pi].ownerPeerId === pid) { isPassenger = true; break; }
            }
          }
          if (isPassenger) break;
        }
        if (isPassenger) continue;
        // This player has no bird and no living dismounted rider — respawn them
        var slotColor = '#fff';
        for (var si = 0; si < 12; si++) { if (slots[si].peerId === pid) { slotColor = SLOT_COLORS[si].hex; break; } }
        var nb = new Bird('player', GW / 2 + (Math.random() - 0.5) * 200, GH - 50, cfg.sf, slotColor);
        nb.peerId = pid; nb.origCol = slotColor;
        nb.resp = true; nb.respT = 0; nb.alive = false; // start in respawn state
        nb.rider = new Rider(true, 1.0, cfg.sf, slotColor);
        nb.rider.mounted = true; nb.rider.ownerPeerId = pid;
        gameBirds.push(nb);
        if (pid === myPeerId) ctrlMode = 'bird';
      }

      // Floating texts
      for (var i = 0; i < fTexts.length; i++) { if (!fTexts[i].stat) fTexts[i].y += 30 * dt; fTexts[i].life -= dt; }
      fTexts = fTexts.filter(function (f) { return f.life > 0; });

      // Death bird spawning
      dbTimer -= dt;
      if (dbTimer <= 0 && dBirds.length === 0) { spawnDeathBird(); dbTimer = cfg.dd2 || 30; }

      // Wave completion check
      if (isHost) checkWaveComplete();
    }

    // ============================================================
    // HOST STATE BROADCAST
    // ============================================================
    var statesSent = 0, statesReceived = 0, inputsSent = 0, inputsReceived = 0;
    var pendingSounds = []; // host queues sounds, broadcast with state, client plays them
    var pendingTexts = []; // host queues floating texts for client display
    function hostBroadcastState() {
      if (!isHost) return;
      statesSent++;
      var birdStates = [];
      for (var i = 0; i < gameBirds.length; i++) {
        var b = gameBirds[i];
        var passData = undefined;
        if (b.passengers && b.passengers.length > 0) {
          passData = b.passengers.map(function(p) { return { pid: p.ownerPeerId, col: p.col }; });
        }
        var birdOut = {
          peerId: b.peerId, slotIndex: b.slotIndex,
          x: Math.round(b.x * 10) / 10, y: Math.round(b.y * 10) / 10,
          vx: Math.round(b.vx * 10) / 10, vy: Math.round(b.vy * 10) / 10,
          st: b.st, mDir: b.mDir, alive: b.alive, resp: b.resp, respT: b.respT,
          hasRider: !!b.rider, type: b.type,
          pass: passData
        };
        if (b.flapPending) {
          birdOut.fl = 1;
          if (!hostBroadcastState._sentN) hostBroadcastState._sentN = 0;
          hostBroadcastState._sentN++;
          if (hostBroadcastState._sentN % 5 === 1) console.log('[GAME-FLAP SEND] bird pid=' + (b.peerId ? b.peerId.slice(0,4) : '?') + ' count=' + hostBroadcastState._sentN);
          b.flapPending = false;
        }
        birdStates.push(birdOut);
      }
      // AI bird states
      var aiStates = [];
      for (var i = 0; i < aiBirds.length; i++) {
        var b = aiBirds[i];
        aiStates.push({
          x: Math.round(b.x * 10) / 10, y: Math.round(b.y * 10) / 10,
          vx: Math.round(b.vx * 10) / 10, vy: Math.round(b.vy * 10) / 10,
          st: b.st, mDir: b.mDir, alive: b.alive, aiMode: b.aiMode,
          hasRider: !!b.rider, type: b.type,
          stam: Math.round(b.stam * 100) / 100, ch: b.ch, cs: b.cs, cl: b.cl
        });
      }
      // Death bird states
      var dbStates = [];
      for (var i = 0; i < dBirds.length; i++) {
        var b = dBirds[i];
        dbStates.push({
          x: Math.round(b.x * 10) / 10, y: Math.round(b.y * 10) / 10,
          vx: Math.round(b.vx * 10) / 10, vy: Math.round(b.vy * 10) / 10,
          st: b.st, mDir: b.mDir, alive: b.alive
        });
      }
      // Dismounted rider states
      var drStates = [];
      for (var i = 0; i < dRiders.length; i++) {
        var r = dRiders[i]; if (!r.alive || r.mounted) continue;
        drStates.push({
          x: Math.round(r.x * 10) / 10, y: Math.round(r.y * 10) / 10,
          vx: Math.round(r.vx * 10) / 10, vy: Math.round(r.vy * 10) / 10,
          st: r.st, isP: r.isP, alive: r.alive, heat: Math.round(r.heat * 10) / 10,
          ownerPeerId: r.ownerPeerId,
          col: r.col
        });
      }
      // Platform states
      var platStates = [];
      for (var i = 0; i < plats.length; i++) {
        var p = plats[i];
        platStates.push({ id: p.id, w: Math.round(p.w * 10) / 10, alive: p.alive });
      }
      var sndList = pendingSounds.length > 0 ? pendingSounds.slice() : undefined;
      pendingSounds = [];
      broadcast({
        type: 'state', tick: gameTick,
        birds: birdStates, ai: aiStates, db: dbStates, dr: drStates,
        plats: platStates,
        pLives: playerLives, pScores: playerScores,
        score: score, lives: lives, wave: wave,
        gameTime: gameTime,
        snd: sndList,
        lavaH: lavaH !== null ? Math.round(lavaH * 10) / 10 : null,
        lavaBaseH: Math.round(lavaBaseH * 10) / 10
      });
    }

    function applyHostState(msg) {
      gameTick = msg.tick;
      gameTime = msg.gameTime || gameTime;

      // Play sounds from host events
      if (msg.snd) {
        for (var si = 0; si < msg.snd.length; si++) {
          var s = msg.snd[si];
          if (s === 'b') { playTone(600, 0.08, 0.2); }
          else if (s === 'k') { playTone(200, 0.05, 0.25); setTimeout(function () { playTone(600, 0.15, 0.2); }, 30); }
          else if (s === 'd') { playTone(1200, 0.1, 0.3); setTimeout(function () { playTone(300, 0.2, 0.2); }, 80); }
        }
      }

      // Accept host's score/lives/wave as authoritative
      if (msg.score !== undefined) score = msg.score;
      if (msg.lives !== undefined) lives = msg.lives;
      if (msg.wave !== undefined && msg.wave !== wave) {
        // Wave changed — reinitialize level config and lava on client
        var oldWave = wave;
        wave = msg.wave;
        cfg = makeLevel(wave);
        // Rebuild platforms
        plats = cfg.platforms.map(function(p) { return new Plat(p.id, p.x, p.y, p.w, cfg.sf); });
        // Transition lava smoothly — deactivate old peaks/sources (they drift off)
        // and add new ones, mirroring exactly what the host does in setupWave
        deactivateOldLavaSources(wave);
        if (cfg.lava) {
          lavaBaseTarget = cfg.lava.baseH;
          // Only snap on first wave or when starting from nothing
          if (wave === 1 || lavaBaseH === 0) lavaBaseH = cfg.lava.baseH;
          lavaH = lavaBaseH;
          addLavaSources(wave, cfg.lava.waves);
        } else {
          lavaBaseTarget = 0;
        }
        gameTime = msg.gameTime || 0; // sync gameTime on wave change for lava timing
        console.log('Client: wave changed ' + oldWave + ' -> ' + wave);
      } else if (msg.wave !== undefined) {
        wave = msg.wave;
      }
      if (msg.pLives) playerLives = msg.pLives;
      if (msg.pScores) playerScores = msg.pScores;
      // Sync lava base height from host
      if (msg.lavaBaseH !== undefined) lavaBaseTarget = msg.lavaBaseH;

      // Player birds — rebuild to match host exactly (1:1 mapping by index)
      var birds = msg.birds || [];
      // Build new gameBirds array matching host, reuse existing objects where peerId matches
      var newGameBirds = [];
      var usedLocal = {}; // track which local birds we've matched
      for (var i = 0; i < birds.length; i++) {
        var bs = birds[i];
        // Find an UNUSED local bird with this peerId
        var bird = null;
        for (var j = 0; j < gameBirds.length; j++) {
          if (gameBirds[j].peerId === bs.peerId && !usedLocal[j]) { bird = gameBirds[j]; usedLocal[j] = true; break; }
        }
        if (!bird) {
          // Host has a bird we don't — create it
          var slotColor = '#fff';
          for (var si = 0; si < 12; si++) { if (slots[si].peerId === bs.peerId) { slotColor = SLOT_COLORS[si].hex; break; } }
          bird = new Bird('player', bs.x, bs.y, cfg ? cfg.sf : 1, slotColor);
          bird.peerId = bs.peerId; bird.origCol = slotColor;
          if (bs.hasRider) { bird.rider = new Rider(true, 1.0, bird.sf, slotColor); bird.rider.mounted = true; bird.rider.ownerPeerId = bs.peerId; }
          if (bs.peerId === myPeerId) ctrlMode = 'bird';
        }
        newGameBirds.push(bird);
        // Smooth correction: wrap-aware interpolation + steering offsets (ported from Xcode)
        var pid = bs.peerId || ('b' + i);
        var wDx = wrappedDeltaX(bird.x, bs.x);
        var bDy = bs.y - bird.y;
        var bDist = Math.hypot(wDx, bDy);
        var isLocalBird = bs.peerId === myPeerId || (hasLocalPlayer2 && bs.peerId === localPlayer2PeerId);
        var alpha = adaptiveBlendAlpha();
        if (isLocalBird) {
          // Local bird: steering offset correction (Xcode technique)
          if (bDist > 100) {
            // Hard snap — large error
            bird.x = bs.x; bird.y = bs.y; bird.vx = bs.vx; bird.vy = bs.vy;
            steeringOffsets[pid] = { dx: 0, dy: 0 };
            hardSnapTime[pid] = performance.now() / 1000;
          } else if (bDist > 3) {
            // Apply correction as steering offset that decays over frames
            if (!steeringOffsets[pid]) steeringOffsets[pid] = { dx: 0, dy: 0 };
            steeringOffsets[pid].dx += wDx * 0.2;
            steeringOffsets[pid].dy += bDy * 0.2;
            // Tiered velocity reconciliation (from Xcode)
            var dvx = bs.vx - bird.vx, dvy = bs.vy - bird.vy;
            if (Math.abs(dvx) > 200) bird.vx = bs.vx;
            else if (Math.abs(dvx) > 50) bird.vx += dvx * 0.6;
            else bird.vx += dvx * 0.35;
            if (Math.abs(dvy) > 200) bird.vy = bs.vy;
            else if (Math.abs(dvy) > 50) bird.vy += dvy * 0.6;
            else bird.vy += dvy * 0.35;
          }
        } else {
          // Remote birds: wrap-aware interpolation with adaptive alpha
          if (bDist > 150) {
            bird.x = bs.x; bird.y = bs.y; bird.vx = bs.vx; bird.vy = bs.vy;
            hardSnapTime[pid] = performance.now() / 1000;
          } else {
            bird.x = wrappedLerpX(bird.x, bs.x, alpha);
            bird.y += bDy * alpha;
            bird.vx = bs.vx; bird.vy = bs.vy;
          }
        }
        bird.st = bs.st; bird.mDir = bs.mDir; bird.alive = bs.alive;
        bird.resp = bs.resp; bird.respT = bs.respT;
        if (bs.fl && !isHost) {
          var isLocalFlapper = (bird.peerId === myPeerId || (hasLocalPlayer2 && bird.peerId === localPlayer2PeerId));
          if (!isLocalFlapper) {
            bird.wFlap();
            if (!applyHostState._recvN) applyHostState._recvN = 0;
            applyHostState._recvN++;
            if (applyHostState._recvN % 5 === 1) console.log('[GAME-FLAP RECV] bird pid=' + (bird.peerId ? bird.peerId.slice(0,4) : '?') + ' count=' + applyHostState._recvN);
          }
        }
        if (bs.hasRider && !bird.rider) {
          bird.rider = new Rider(true, 1.0, bird.sf, bird.origCol || bird.col);
          bird.rider.mounted = true;
          bird.rider.ownerPeerId = bird.peerId;
          // If this is my bird getting a rider back, switch to bird mode
          if (bird.peerId === myPeerId) ctrlMode = 'bird';
          if (hasLocalPlayer2 && bird.peerId === localPlayer2PeerId) ctrlMode2 = 'bird';
        }
        else if (!bs.hasRider && bird.rider) {
          // Host says rider was knocked off — switch to rider mode if it's my bird
          if (bird.peerId === myPeerId && ctrlMode === 'bird') {
            ctrlMode = 'rider';
          }
          if (hasLocalPlayer2 && bird.peerId === localPlayer2PeerId && ctrlMode2 === 'bird') {
            ctrlMode2 = 'rider';
          }
          bird.rider = null;
        }
      }
      // Sync passengers on each bird
      for (var i = 0; i < birds.length; i++) {
        var bs = birds[i];
        if (i < newGameBirds.length) {
          var bird = newGameBirds[i];
          if (bs.pass && bs.pass.length > 0) {
            if (!bird.passengers) bird.passengers = [];
            // Rebuild passengers to match host
            bird.passengers = bs.pass.map(function(pd) {
              var pr = new Rider(true, 0.5, cfg ? cfg.sf : 1, pd.col || '#fff');
              pr.ownerPeerId = pd.pid; pr.isP = true; pr.mounted = true; pr.st = 'rescued';
              pr.x = bird.x; pr.y = bird.y + bird.h * 0.5;
              return pr;
            });
          } else {
            bird.passengers = null;
          }
        }
      }
      // Replace gameBirds with the exact set from host (no duplicates possible)
      gameBirds = newGameBirds;

      // Sync AI birds: create/remove to match host count, blend positions
      var aiStates = msg.ai || [];
      while (aiBirds.length > aiStates.length) aiBirds.pop();
      for (var i = 0; i < aiStates.length; i++) {
        var as = aiStates[i];
        if (i >= aiBirds.length) {
          var ab = new Bird(as.type || 'ai', as.x, as.y, cfg ? cfg.sf : 1);
          ab.stam = as.stam || 0.5;
          ab.ch = as.ch || 0; ab.cs = as.cs || 40; ab.cl = as.cl || 50;
          ab.col = 'hsl(' + ab.ch + ',' + ab.cs + '%,' + ab.cl + '%)';
          if (as.hasRider) { ab.rider = new Rider(false, ab.stam, ab.sf); ab.rider.mounted = true; }
          aiBirds.push(ab);
        } else {
          var ab = aiBirds[i];
          // Smooth blend position (wrap-aware, adaptive alpha)
          var aiAlpha = adaptiveBlendAlpha();
          ab.x = wrappedLerpX(ab.x, as.x, aiAlpha);
          ab.y += (as.y - ab.y) * aiAlpha;
          ab.vx += (as.vx - ab.vx) * aiAlpha; ab.vy += (as.vy - ab.vy) * aiAlpha;
          ab.st = as.st; ab.mDir = as.mDir; ab.alive = as.alive; ab.aiMode = as.aiMode || ab.aiMode;
          if (as.hasRider && !ab.rider) { ab.rider = new Rider(false, ab.stam, ab.sf); ab.rider.mounted = true; }
          else if (!as.hasRider && ab.rider) { ab.rider = null; }
        }
      }

      // Sync death birds
      var dbStates = msg.db || [];
      while (dBirds.length > dbStates.length) dBirds.pop();
      for (var i = 0; i < dbStates.length; i++) {
        var ds = dbStates[i];
        if (i >= dBirds.length) {
          var db = new Bird('death', ds.x, ds.y, cfg ? cfg.sf : 1);
          dBirds.push(db);
        } else {
          var db = dBirds[i];
          var dbAlpha = adaptiveBlendAlpha();
          db.x = wrappedLerpX(db.x, ds.x, dbAlpha); db.y += (ds.y - db.y) * dbAlpha;
          db.vx += (ds.vx - db.vx) * dbAlpha; db.vy += (ds.vy - db.vy) * dbAlpha;
          db.st = ds.st; db.mDir = ds.mDir; db.alive = ds.alive;
        }
      }

      // Sync dismounted riders from host — rebuild to match exactly
      var drStates = msg.dr || [];
      var newDRiders = [];
      for (var i = 0; i < drStates.length; i++) {
        var ds = drStates[i];
        // Try to reuse existing local rider for smooth blending
        var existing = null;
        for (var j = 0; j < dRiders.length; j++) {
          if (ds.isP && ds.ownerPeerId && dRiders[j].ownerPeerId === ds.ownerPeerId && dRiders[j].alive) {
            existing = dRiders[j]; break;
          } else if (!ds.isP && !dRiders[j].isP && dRiders[j].alive && !dRiders[j]._drUsed) {
            existing = dRiders[j]; dRiders[j]._drUsed = true; break;
          }
        }
        if (existing) {
          // Don't override local player's own rider position — local prediction handles it
          var isMyRider = existing.ownerPeerId === myPeerId && ctrlMode === 'rider';
          if (isMyRider) {
            // Only sync non-position state from host (heat, alive status)
            existing.heat = ds.heat || 0;
            existing.st = ds.st;
          } else {
            var drAlpha = adaptiveBlendAlpha();
            existing.x = wrappedLerpX(existing.x, ds.x, drAlpha);
            existing.y += (ds.y - existing.y) * drAlpha;
            existing.vx = ds.vx || 0; existing.vy = ds.vy || 0;
            existing.st = ds.st; existing.heat = ds.heat || 0;
          }
          newDRiders.push(existing);
        } else {
          var nr = new Rider(ds.isP, 0.5, cfg ? cfg.sf : 1, ds.col || '#fff');
          nr.x = ds.x; nr.y = ds.y; nr.vx = ds.vx || 0; nr.vy = ds.vy || 0;
          nr.st = ds.st; nr.alive = true; nr.mounted = false;
          nr.ownerPeerId = ds.ownerPeerId || null; nr.isP = ds.isP;
          newDRiders.push(nr);
        }
      }

      for (var j = 0; j < dRiders.length; j++) delete dRiders[j]._drUsed;
      dRiders = newDRiders;
      // Remove dead riders
      dRiders = dRiders.filter(function(r) { return r.alive; });

      // Sync platform states
      var platStates = msg.plats || [];
      for (var i = 0; i < platStates.length; i++) {
        var ps = platStates[i];
        for (var j = 0; j < plats.length; j++) {
          if (plats[j].id === ps.id) {
            plats[j].alive = ps.alive;
            if (ps.w !== undefined) plats[j].w = ps.w;
            break;
          }
        }
      }

      // Rebuild allB
      allB = gameBirds.concat(aiBirds, dBirds).filter(function (b) { return b.alive; });
    }

    // ============================================================
    // INPUT (sends to host in game mode)
    // ============================================================
    var inputSendTimer = 0;
    var INPUT_SEND_INTERVAL = 0.1; // 10Hz
    var inputDiagLogged = 0;
    function sendInputToHost() {
      if (isHost) return;
      inputDiagLogged++;
      // Diagnostic: log first few sends and periodic check
      if (inputDiagLogged === 1 || inputDiagLogged === 60 || inputDiagLogged === 300) {
        var dcCount = 0, dcInfo = [];
        for (var pid in dataChannels) {
          dcCount++;
          var dc = dataChannels[pid];
          dcInfo.push({ pid: pid.slice(0,4), state: dc ? dc.readyState : 'null', buf: dc ? dc.bufferedAmount : -1 });
        }
        console.log('INPUT DIAG #' + inputDiagLogged + ': dcCount=' + dcCount + ' ch=' + JSON.stringify(dcInfo) + ' inSent=' + inputsSent + ' timer=' + inputSendTimer.toFixed(3) + ' lastKeys=' + lastSentKeys.slice(0,20));
      }
      inputSendTimer += 0.016;
      var hasChange = false;
      var keyStr = JSON.stringify(keys) + (flapEdge ? '1' : '0');
      if (keyStr !== lastSentKeys) { lastSentKeys = keyStr; hasChange = true; }
      if (hasChange || inputSendTimer >= INPUT_SEND_INTERVAL) {
        inputSendTimer = 0;
        inputsSent++;
        broadcast({
          type: 'input',
          peerId: myPeerId,
          keys: { l: keys.l, r: keys.r, flap: keys.flap, dn: keys.dn },
          flapEdge: flapEdge
        });
      }
      // Player 2 input (local WASD)
      if (hasLocalPlayer2) {
        var keyStr2 = JSON.stringify(keys2) + (flapEdge2 ? '1' : '0');
        var hasChange2 = keyStr2 !== lastSentKeys2;
        if (hasChange2) lastSentKeys2 = keyStr2;
        if (hasChange2 || inputSendTimer <= 0.001) {
          broadcast({
            type: 'input',
            peerId: localPlayer2PeerId,
            keys: { l: keys2.l, r: keys2.r, flap: keys2.flap, dn: keys2.dn },
            flapEdge: flapEdge2
          });
        }
      }
    }

    // ============================================================
    // RENDERING: LOBBY
    // ============================================================
    function renderLobby() {
      var scX = canvas.width / GW, scY = canvas.height / GH, sc = Math.min(scX, scY);
      var oX = (canvas.width - GW * sc) / 2, oY = (canvas.height - GH * sc) / 2;
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.save(); ctx.translate(oX, oY); ctx.scale(sc, sc);

      // Title: "JOUSTINE" + "WebRTC" (interactive)
      ctx.font = 'bold 48px monospace'; ctx.textBaseline = 'middle';
      var titleLeft = 'JOUSTINE ';
      var titleRight = 'WebRTC';
      var fullW = ctx.measureText(titleLeft + titleRight).width;
      var startX = GW * 0.5 - fullW / 2;
      ctx.textAlign = 'left';
      ctx.fillStyle = '#fff';
      ctx.fillText(titleLeft, startX, 50);
      var webrtcX = startX + ctx.measureText(titleLeft).width;
      var webrtcW = ctx.measureText(titleRight).width;
      ctx.fillStyle = webrtcHover ? '#0ff' : '#aaf';
      ctx.fillText(titleRight, webrtcX, 50);
      if (webrtcHover) {
        ctx.fillRect(webrtcX, 50 + 20, webrtcW, 3);
      }
      // Store hit area for mouse/touch detection (game coords)
      webrtcHitBox = { x: webrtcX, y: 50 - 24, w: webrtcW, h: 48 };

      // Level chooser (top center)
      var lvY = 110;
      ctx.fillStyle = '#888'; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center';
      // Left arrow
      ctx.fillStyle = selectedLevel > 1 ? '#fff' : '#444';
      ctx.fillText('<', GW * 0.35, lvY);
      // Level name
      ctx.fillStyle = '#0ff'; ctx.font = 'bold 32px monospace';
      ctx.fillText(getLevelName(selectedLevel), GW * 0.5, lvY);
      // Right arrow
      ctx.fillStyle = selectedLevel < 100 ? '#fff' : '#444';
      ctx.font = 'bold 36px monospace';
      ctx.fillText('>', GW * 0.65, lvY);

      // 3x4 grid of player slots (left 40%)
      var gridLeft = 40, gridTop = 160;
      var slotW = (GW * 0.38 - 60) / 3;
      var slotH = (GH - gridTop - 40) / 4;
      var gap = 10;

      for (var i = 0; i < 12; i++) {
        var col = i % 3, row = Math.floor(i / 3);
        var sx = gridLeft + col * (slotW + gap);
        var sy = gridTop + row * (slotH + gap);
        var slot = slots[i];
        var color = SLOT_COLORS[i];
        var isOccupied = slot.peerId !== null;
        var isMe = slot.peerId === myPeerId;

        // Background
        ctx.globalAlpha = isOccupied ? 0.8 : 0.2;
        ctx.fillStyle = color.hex;
        // Rounded rect
        var cr = 12;
        ctx.beginPath();
        ctx.moveTo(sx + cr, sy); ctx.lineTo(sx + slotW - cr, sy);
        ctx.quadraticCurveTo(sx + slotW, sy, sx + slotW, sy + cr);
        ctx.lineTo(sx + slotW, sy + slotH - cr);
        ctx.quadraticCurveTo(sx + slotW, sy + slotH, sx + slotW - cr, sy + slotH);
        ctx.lineTo(sx + cr, sy + slotH);
        ctx.quadraticCurveTo(sx, sy + slotH, sx, sy + slotH - cr);
        ctx.lineTo(sx, sy + cr);
        ctx.quadraticCurveTo(sx, sy, sx + cr, sy);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;

        // Pulse if ready
        if (slot.ready) {
          ctx.globalAlpha = 0.3 + 0.2 * Math.sin(performance.now() / 200);
          ctx.strokeStyle = color.hex;
          ctx.lineWidth = 3;
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        // Border for own slot
        if (isMe) {
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        // Color name
        ctx.fillStyle = isOccupied ? '#000' : '#888';
        ctx.font = 'bold 18px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(color.name.toUpperCase(), sx + slotW / 2, sy + 8);

        // Status text
        ctx.font = '14px monospace'; ctx.textBaseline = 'middle';
        var statusY = sy + slotH / 2 + 5;
        if (!isOccupied) {
          ctx.fillStyle = '#666';
          ctx.fillText('Available', sx + slotW / 2, statusY);
        } else if (slot.ready) {
          ctx.fillStyle = '#000';
          ctx.font = 'bold 20px monospace';
          ctx.fillText('READY!', sx + slotW / 2, statusY);
        } else if (slot.holding) {
          ctx.fillStyle = '#000';
          ctx.fillText(Math.round(slot.progress) + '%', sx + slotW / 2, statusY);
        } else {
          ctx.fillStyle = '#333';
          ctx.fillText(slot.deviceInfo || 'Joined', sx + slotW / 2, statusY);
        }

        // Progress ring — centered on slot, big enough to overlap edges while corners poke out
        if (slot.holding && !slot.ready) {
          var cx = sx + slotW / 2, cy = sy + slotH / 2;
          var ringR = Math.max(slotW, slotH) * 0.55;
          ctx.beginPath();
          ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(0,0,0,0.3)';
          ctx.lineWidth = 8;
          ctx.stroke();

          ctx.beginPath();
          var startAngle = -Math.PI / 2;
          var endAngle = startAngle + (slot.progress / 100) * Math.PI * 2;
          ctx.arc(cx, cy, ringR, startAngle, endAngle);
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 8;
          ctx.stroke();
        }

        // Peer ID (small)
        if (isOccupied) {
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.font = '10px monospace'; ctx.textBaseline = 'bottom';
          ctx.fillText(slot.peerId.slice(0, 4), sx + slotW / 2, sy + slotH - 4);
        }
      }

      // QR code (right side)
      if (qrCanvas) {
        var qrSize = Math.min(800, GH - 200);
        var qrX = GW * 0.55 + (GW * 0.45 - qrSize) / 2;
        var qrY = 180;
        // URL text above QR
        ctx.fillStyle = '#aaa'; ctx.font = '20px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.fillText('erd.mmec.ca/gm3/', qrX + qrSize / 2, qrY - 10);
        ctx.drawImage(qrCanvas, qrX, qrY, qrSize, qrSize);
      }

      // Host indicator
      ctx.fillStyle = '#666'; ctx.font = '14px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
      var hostText = isHost ? 'You are HOST' : ('Host: ' + (hostPeerId ? hostPeerId.slice(0, 4) : '?'));
      ctx.fillText(hostText, 40, GH - 10);

      // Peer count
      var peerCount = Object.keys(connectedPeerIds).length;
      ctx.fillStyle = '#666'; ctx.textAlign = 'right';
      ctx.fillText('Peers: ' + peerCount + ' | ' + myPeerId.slice(0, 4), GW - 20, GH - 10);

      // Instructions

    // ============================================================
    // RENDERING: GAME
    // ============================================================
    function toScr(gx, gy) { return { x: gx, y: GH - gy }; }

    function drawRiderWrapped(r, drawFn) {

          ctx.lineTo(arrW / 2 + 1.5, -arrH / 2 + 1.5);
          ctx.lineTo(0, arrH / 2 + 1.5);

      //   (LOCKOUT - FADE) → LOCKOUT: GAME OVER fades out, "FLAP TO RETURN" fades in

      var goOutAlpha = 1, flapInAlpha = 0;

        if (wave > 1) { ctx.font = '20px monospace'; ctx.fillStyle = '#888'; ctx.fillText('Scale: ' + (cfg.sf).toFixed(1) + 'x  |  Enemies: ' + cfg.birdCount, GW / 2, GH * 0.47); }
