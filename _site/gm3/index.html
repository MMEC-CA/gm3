    // ============================================================
    // RACEWAY MULTIPLAYER
    // ============================================================
    // Two-phase state machine:
    //   Phase 1: Lobby (12 color slots, QR code)
    //   Phase 2: Game (top-down racing, scrolling track, last car standing)
    // ============================================================

    var BUILD = 'v2026-04-20-ab';
    var GW = 1920, GH = 1080;

    // ============================================================
    // CAR / TRACK CONSTANTS
    // ============================================================
    var CAR_W = 44, CAR_H = 76;
    var CAR_MAX_SPEED = 820;
    var CAR_ACCEL = 480;
    var CAR_BRAKE = 900;
    var CAR_FRICTION = 260;
    var CAR_REVERSE_SPEED = 220;
    var CAR_TURN_RATE = 2.2;       // rad/sec at full speed
    var CAR_MIN_TURN_SPEED = 80;   // minimum speed for any turning
    var CAR_COLLISION_R = 42;
    var CAR_OFF_ROAD_DRAG = 4.5;   // friction multiplier off road
    var TRACK_HW = 310;            // half-width of driveable road
    var TRACK_SHOULDER = 70;       // extra shoulder before penalty

      { name: 'Yellow',  hex: '#FFD700' },
      { name: 'Cyan',    hex: '#00FFFF' },
      { name: 'Orange',  hex: '#FF8C00' },
      { name: 'Magenta', hex: '#FF00FF' },
      { name: 'White',   hex: '#FFFFFF' },
      { name: 'Green',   hex: '#00FF00' },
      { name: 'Amber',   hex: '#FFBF00' },

    // ============================================================

    var flapEdge = false;

    var lastSentKeys = '';

    var HOST_BROADCAST_INTERVAL = 1 / 20;

    // ============================================================
    // SOUND
    // ============================================================
    var audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playTone(freq, dur, vol, type) {
      if (!audioCtx) return;
      var o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type || 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.3, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur);
    }
    function sndEngine(speed) {
      if (!audioCtx) return;
      var pitch = 80 + speed * 0.12;
      playTone(pitch, 0.08, 0.06, 'sawtooth');
    }
    function sndBounce() {
      if (lobbyState !== 'game' || isHost) {
        playTone(300, 0.12, 0.25, 'square');
        setTimeout(function(){ playTone(200, 0.1, 0.15); }, 60);
        if (isHost) pendingSounds.push('b');
      }
    }
    function sndElim() {
      if (lobbyState !== 'game' || isHost) {
        playTone(200, 0.05, 0.3); setTimeout(function(){ playTone(120, 0.3, 0.2); }, 40);
        if (isHost) pendingSounds.push('k');

    }

    // ============================================================
    // UTILITY
    // ============================================================
    function getDeviceInfo() {
      var ua = navigator.userAgent;
      if (/iPhone/.test(ua)) return 'iPhone (touch)';
      if (/iPad/.test(ua)) return 'iPad (touch)';
      if (/Android/.test(ua)) {
        if (/Mobile/.test(ua)) return 'Android (touch)';
        return 'Android tablet (touch)';
      }
      if (/Mac/.test(ua)) return 'Mac (\u2190\u2192 + WASD)';
      if (/Win/.test(ua)) return 'Windows (\u2190\u2192 + WASD)';
      if (/Linux/.test(ua)) return 'Linux (\u2190\u2192 + WASD)';
      return 'Browser';
    }

    function wrapText(ctx, text, maxW) {
      var words = text.split(' '), lines = [], line = '';
      for (var wi = 0; wi < words.length; wi++) {
        var test = line ? line + ' ' + words[wi] : words[wi];
        if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = words[wi]; }
        else { line = test; }
      }
      if (line) lines.push(line);
      return lines;
    }

    // ============================================================
    // BENCHMARK
    // ============================================================
    function runBenchmark() {
      var start = performance.now();
      var x = 0, y = 0, vx = 1, vy = 0;
      for (var i = 0; i < 50000; i++) {
        vy += -9.8 * 0.016; x += vx * 0.016; y += vy * 0.016;
        if (y < 0) { y = 0; vy = -vy * 0.5; }
        if (x > 100) { x = 100; vx = -vx; }
        if (x < 0) { x = 0; vx = -vx; }
      }
      return Math.round(100000 / Math.max(1, performance.now() - start));
    }

    // ============================================================
    // QR CODE
    // ============================================================
    function generateQR(url) {
      var qr = qrcode(0, 'M');
      qr.addData(url);
      qr.make();
      var count = qr.getModuleCount();
      var cellSize = 8, margin = cellSize * 2;
      var px = count * cellSize + margin * 2;
      var c = document.createElement('canvas');
      c.width = px; c.height = px;
      var qctx = c.getContext('2d');
      qctx.fillStyle = '#fff'; qctx.fillRect(0, 0, px, px);
      qctx.fillStyle = '#000';
      for (var row = 0; row < count; row++) {
        for (var col = 0; col < count; col++) {
          if (qr.isDark(row, col)) qctx.fillRect(margin + col * cellSize, margin + row * cellSize, cellSize, cellSize);
        }
      }
      return c;
    }

    // ============================================================
    // TRACK GENERATION
    // ============================================================
    function prngStep() {
      trackPrng = (Math.imul(trackPrng, 1664525) + 1013904223) >>> 0;
      return trackPrng / 0x100000000;
    }

    function initTrack(seed) {
      trackKnots = [];
      trackPrng = (seed * 7919 + 1) >>> 0;
      if (trackPrng === 0) trackPrng = 1;
      var cx = GW / 2;
      var curvature = 0;
      for (var i = 0; i < 300; i++) {
        trackKnots.push({ y: i * SEGMENT_LEN, cx: cx });
        curvature += (prngStep() - 0.5) * 0.55;
        curvature = Math.max(-1.3, Math.min(1.3, curvature));
        cx += curvature * TRACK_HW * 0.38;
        cx = Math.max(TRACK_HW * 1.5, Math.min(GW - TRACK_HW * 1.5, cx));
      }
    }

    function extendTrack() {
      var last = trackKnots[trackKnots.length - 1];
      var cx = last.cx;
      // Reuse last curvature direction from the knot before last
      var prev = trackKnots[trackKnots.length - 2];
      var curvature = prev ? (last.cx - prev.cx) / (TRACK_HW * 0.38) : 0;
      for (var i = 0; i < 50; i++) {
        curvature += (prngStep() - 0.5) * 0.55;
        curvature = Math.max(-1.3, Math.min(1.3, curvature));
        cx += curvature * TRACK_HW * 0.38;
        cx = Math.max(TRACK_HW * 1.5, Math.min(GW - TRACK_HW * 1.5, cx));
        trackKnots.push({ y: last.y + (i + 1) * SEGMENT_LEN, cx: cx });
      }
    }

    function trackCxAtY(wy) {
      if (trackKnots.length < 2) return GW / 2;
      var idx = Math.floor(wy / SEGMENT_LEN);
      idx = Math.max(0, Math.min(trackKnots.length - 2, idx));
      var k0 = trackKnots[idx], k1 = trackKnots[idx + 1];
      if (!k0 || !k1) return GW / 2;
      var t = (wy - k0.y) / SEGMENT_LEN;
      return k0.cx + (k1.cx - k0.cx) * t;
    }

    // World → game-coords (for use after ctx.translate/scale in game viewport)
    // In game-coords: X same, Y inverted so higher worldY = lower gameY (further up screen)
    function wToG(wx, wy) {
      return { x: wx, y: camWorldY + GH / 2 - wy };
    }

    // ============================================================
    // CAR CLASS
    // ============================================================
    function Car(peerId, slotIndex, x, y) {
      this.peerId = peerId;
      this.slotIndex = slotIndex;
      this.x = x;
      this.y = y;
      this.angle = 0;   // 0 = pointing up (+worldY = forward)
      this.speed = 0;
      this.vx = 0;
      this.vy = 0;
      this.alive = true;
      this.eliminated = false;
      this.color = SLOT_COLORS[slotIndex % 12].hex;
    }

    Car.prototype.update = function(dt, input) {
      if (this.eliminated) return;

      if (input) {
        // Turning: rate proportional to speed, minimum threshold
        var absSpd = Math.abs(this.speed);
        if (absSpd > CAR_MIN_TURN_SPEED) {
          var turnFactor = Math.min(1, absSpd / (CAR_MAX_SPEED * 0.5));
          var turnDir = this.speed >= 0 ? 1 : -1;
          if (input.l) this.angle -= CAR_TURN_RATE * turnFactor * turnDir * dt;
          if (input.r) this.angle += CAR_TURN_RATE * turnFactor * turnDir * dt;
        }

        if (input.flap) {
          this.speed = Math.min(this.speed + CAR_ACCEL * dt, CAR_MAX_SPEED);
        } else if (input.dn) {
          if (this.speed > 0) {
            this.speed = Math.max(0, this.speed - CAR_BRAKE * dt);
          } else {
            this.speed = Math.max(-CAR_REVERSE_SPEED, this.speed - CAR_ACCEL * 0.6 * dt);
          }
        } else {
          var sign = this.speed > 0 ? 1 : -1;
          this.speed = sign * Math.max(0, Math.abs(this.speed) - CAR_FRICTION * dt);
        }
      } else {
        // No input: coast to stop
        var sign2 = this.speed > 0 ? 1 : -1;
        this.speed = sign2 * Math.max(0, Math.abs(this.speed) - CAR_FRICTION * dt);
      }

      // Off-road friction
      var tcx = trackCxAtY(this.y);
      var distCenter = Math.abs(this.x - tcx);
      if (distCenter > TRACK_HW + TRACK_SHOULDER) {
        this.speed *= Math.pow(1 / CAR_OFF_ROAD_DRAG, dt);
      } else if (distCenter > TRACK_HW) {
        var offFrac = (distCenter - TRACK_HW) / TRACK_SHOULDER;
        this.speed *= Math.pow(1 / (1 + (CAR_OFF_ROAD_DRAG - 1) * offFrac), dt);
      }

      // Integrate position
      this.vx = Math.sin(this.angle) * this.speed;
      this.vy = Math.cos(this.angle) * this.speed;
      this.x += this.vx * dt;
      this.y += this.vy * dt;

      // Keep car in world X bounds with a soft wall
      var margin = 60;
      if (this.x < margin) { this.x = margin; this.vx = Math.max(0, this.vx); this.speed = Math.abs(this.speed) * 0.3; }
      if (this.x > GW - margin) { this.x = GW - margin; this.vx = Math.min(0, this.vx); this.speed = Math.abs(this.speed) * 0.3; }
    };

    // ============================================================
    // CAR COLLISION
    // ============================================================
    function resolveCarCollision(a, b) {
      var dx = b.x - a.x, dy = b.y - a.y;
      var dist2 = dx * dx + dy * dy;
      var minD = CAR_COLLISION_R * 2;
      if (dist2 >= minD * minD || dist2 < 0.0001) return;
      var dist = Math.sqrt(dist2);
      var nx = dx / dist, ny = dy / dist;
      var overlap = (minD - dist) * 0.5;
      a.x -= nx * overlap; a.y -= ny * overlap;
      b.x += nx * overlap; b.y += ny * overlap;

      var aVn = a.vx * nx + a.vy * ny;
      var bVn = b.vx * nx + b.vy * ny;
      if (aVn - bVn <= 0) return; // separating

      var bounce = 0.45;
      var imp = (1 + bounce) * (aVn - bVn) / 2;
      a.vx -= imp * nx; a.vy -= imp * ny;
      b.vx += imp * nx; b.vy += imp * ny;
      a.speed = a.vx * Math.sin(a.angle) + a.vy * Math.cos(a.angle);
      b.speed = b.vx * Math.sin(b.angle) + b.vy * Math.cos(b.angle);
      sndBounce();
    }

    // ============================================================
    // CAMERA UPDATE
    // ============================================================
    function updateCamera(dt) {
      var alive = [];
      for (var i = 0; i < raceCars.length; i++) {
        if (!raceCars[i].eliminated) alive.push(raceCars[i]);
      }
      if (alive.length === 0) return;

      var avgY = 0, leadY = -Infinity, lastY = Infinity;
      for (var i = 0; i < alive.length; i++) {
        avgY += alive[i].y;
        if (alive[i].y > leadY) leadY = alive[i].y;
        if (alive[i].y < lastY) lastY = alive[i].y;
      }
      avgY /= alive.length;

      var spread = leadY - lastY;
      var factor = Math.min(1.0, spread / (GH * 0.65));

      // Leader at 2/3 down screen → camWorldY = leadY + GH/6
      var leadCamY = leadY + GH / 6;
      var tgt = avgY + (leadCamY - avgY) * factor;

      // Camera only scrolls forward (never back) once race begins
      camWorldYTarget = Math.max(camWorldYTarget, tgt);
      camWorldY += (camWorldYTarget - camWorldY) * Math.min(1, CAM_SPEED * dt);
    }

    // ============================================================
    // ELIMINATION CHECK (host only)
    // ============================================================
    function checkEliminations() {
      var bottomWorldY = camWorldY - GH / 2 - 80;
      for (var i = 0; i < raceCars.length; i++) {
        var car = raceCars[i];
        if (car.eliminated) continue;
        if (car.y < bottomWorldY) {
          car.eliminated = true;
          fTexts.push({ text: SLOT_COLORS[car.slotIndex].name.toUpperCase() + ' OUT!',
            x: GW / 2, y: GH * 0.35, life: 3.0, col: car.color, size: 64 });
          sndElim();
        }
      }

      // Count non-eliminated cars
      var alive = 0, lastCar = null;
      for (var i = 0; i < raceCars.length; i++) {
        if (!raceCars[i].eliminated) { alive++; lastCar = raceCars[i]; }
      }
      var total = raceCars.length;

      if (total > 1 && alive <= 1 && lobbyState === 'game') {
        var winPid = lastCar ? lastCar.peerId : null;
        var winName = lastCar ? SLOT_COLORS[lastCar.slotIndex].name : '?';
        fTexts.push({ text: 'GAME OVER', x: GW/2, y: GH*0.55, life: 999, size: 120, stat: true, go: 'main' });
        if (winPid === myPeerId) {
          fTexts.push({ text: 'YOU WIN!', x: GW/2, y: GH*0.42, life: 999, size: 72, stat: true, go: 'main' });
        } else if (winPid) {
          fTexts.push({ text: winName + ' wins!', x: GW/2, y: GH*0.42, life: 999, size: 60, stat: true, go: 'main' });
        }
        fTexts.push({ text: 'TAP TO RETURN TO LOBBY', x: GW/2, y: GH*0.64, life: 999, size: 40, stat: true, go: 'prompt' });
        playTone(440, 0.2, 0.3); setTimeout(function(){playTone(330,0.2,0.3);},200);
        setTimeout(function(){playTone(220,0.4,0.25);},400);
        broadcast({ type:'gameover', winnerPid:winPid, winnerName:winName, pScores:playerScores, wave:wave });
        lobbyState = 'gameover';
        gameOverTime = performance.now() / 1000;
      }
    }

    // ============================================================
    // GAME STEP (host-authoritative physics)
    // ============================================================
    function gameStep(dt) {
      if (!cfg) return;
      gameTime += dt;
      gameTick++;

      // Apply inputs to each car
      for (var i = 0; i < raceCars.length; i++) {
        var car = raceCars[i];
        if (car.eliminated) continue;
        var inp = null;
        if (car.peerId === myPeerId) {
          inp = { l:keys.l, r:keys.r, flap:keys.flap, dn:keys.dn };
        } else if (hasLocalPlayer2 && car.peerId === localPlayer2PeerId) {
          inp = { l:keys2.l, r:keys2.r, flap:keys2.flap, dn:keys2.dn };
        } else if (isHost && remoteInputs[car.peerId]) {
          inp = remoteInputs[car.peerId];
        }
        car.update(dt, inp);
      }

      // Car-car collisions (host only for authority)
      if (isHost) {
        for (var i = 0; i < raceCars.length - 1; i++) {
          for (var j = i + 1; j < raceCars.length; j++) {
            if (!raceCars[i].eliminated && !raceCars[j].eliminated) {
              resolveCarCollision(raceCars[i], raceCars[j]);
            }
          }
        }
      }

      // Camera
      updateCamera(dt);

      // Extend track ahead of leader
      var leadY = camWorldY + GH;
      for (var i = 0; i < raceCars.length; i++) {
        if (!raceCars[i].eliminated && raceCars[i].y > leadY) leadY = raceCars[i].y;
      }
      if (trackKnots.length > 0 && trackKnots[trackKnots.length - 1].y < leadY + SEGMENT_LEN * 80) {
        extendTrack();
      }

      // Eliminations (host only)
      if (isHost) checkEliminations();

      // Tick floating texts
      for (var i = fTexts.length - 1; i >= 0; i--) {
        if (!fTexts[i].stat) { fTexts[i].life -= dt; if (fTexts[i].life <= 0) fTexts.splice(i, 1); }
      }

      // Clear flapEdge
      flapEdge = false; flapEdge2 = false;
      for (var pid in remoteInputs) { if (remoteInputs[pid]) remoteInputs[pid].flapEdge = false; }
    }

    // ============================================================
    // HOST STATE BROADCAST
    // ============================================================
    var statesSent = 0, statesReceived = 0, inputsSent = 0, inputsReceived = 0;
    var pendingSounds = [];
    var pendingTexts = [];

    function hostBroadcastState() {
      if (!isHost) return;
      statesSent++;
      var carStates = [];
      for (var i = 0; i < raceCars.length; i++) {
        var c = raceCars[i];
        carStates.push({
          peerId: c.peerId,
          x: Math.round(c.x * 10) / 10,
          y: Math.round(c.y * 10) / 10,
          angle: Math.round(c.angle * 1000) / 1000,
          speed: Math.round(c.speed * 10) / 10,
          vx: Math.round(c.vx * 10) / 10,
          vy: Math.round(c.vy * 10) / 10,
          eliminated: c.eliminated
        });
      }
      var sndList = pendingSounds.length > 0 ? pendingSounds.slice() : undefined;
      pendingSounds = [];
      broadcast({
        type: 'state', tick: gameTick,
        cars: carStates,
        gameTime: gameTime,
        camY: Math.round(camWorldY * 10) / 10,
        wave: wave,
        snd: sndList
      });
    }

    // ============================================================
    // APPLY HOST STATE (client-side)
    // ============================================================
    function applyHostState(msg) {
      gameTick = msg.tick || gameTick;
      gameTime = msg.gameTime || gameTime;
      if (msg.camY !== undefined) camWorldY += (msg.camY - camWorldY) * 0.25;

      if (msg.snd) {
        for (var si = 0; si < msg.snd.length; si++) {
          var s = msg.snd[si];
          if (s === 'b') { playTone(300, 0.12, 0.25, 'square'); setTimeout(function(){playTone(200,0.1,0.15);},60); }
          else if (s === 'k') { playTone(200,0.05,0.3); setTimeout(function(){playTone(120,0.3,0.2);},40); }
        }
      }
      if (!msg.cars) return;

      for (var i = 0; i < msg.cars.length; i++) {
        var cs = msg.cars[i];
        var car = null;
        for (var j = 0; j < raceCars.length; j++) {
          if (raceCars[j].peerId === cs.peerId) { car = raceCars[j]; break; }
        }
        if (!car) continue;
        if (cs.peerId === myPeerId || cs.peerId === localPlayer2PeerId) {
          // Smooth correction for own car
          car.x += (cs.x - car.x) * 0.28;
          car.y += (cs.y - car.y) * 0.28;
        } else {
          car.x = cs.x; car.y = cs.y;
          car.speed = cs.speed;
          car.vx = cs.vx || car.vx; car.vy = cs.vy || car.vy;
        }
        car.angle = cs.angle;
        car.eliminated = cs.eliminated;
      }
    }

    // ============================================================
    // SIGNALING VIA WEBSOCKET (Durable Object)
    // ============================================================
    function connectSignaling() {
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      var wsUrl = proto + '//' + location.host + '/gm3/api/signal/ws?peerId=' + myPeerId;
      console.log('Connecting to signaling:', wsUrl);
      hud.textContent = 'Connecting to signaling...';

      sigSocket = new WebSocket(wsUrl);

      sigSocket.onopen = function () {
        console.log('Signaling WebSocket connected');
        hud.textContent = 'Connected as ' + myPeerId.slice(0, 4);
      };

      sigSocket.onmessage = function (e) {
        try {
          var msg = JSON.parse(e.data);
          handleSignalingMessage(msg);
        } catch (err) {
          console.error('Bad signaling message:', err);
        }
      };

      sigSocket.onclose = function () {
        console.log('Signaling WebSocket closed, reconnecting in 5s...');
        sigSocket = null;
        sigReconnectTimer = setTimeout(connectSignaling, 5000);
      };

      sigSocket.onerror = function (e) {
        console.error('Signaling WebSocket error:', e);
      };
    }

    function sendSignal(targetPeerId, signalData) {
      if (sigSocket && sigSocket.readyState === WebSocket.OPEN) {
        sigSocket.send(JSON.stringify({ type: 'signal', to: targetPeerId, signal: signalData }));
      }
    }

    function handleSignalingMessage(msg) {
      if (msg.type === 'peers') {
        console.log('Room peers:', msg.peers);
        for (var i = 0; i < msg.peers.length; i++) {
          var peerId = msg.peers[i];
          if (peerId !== myPeerId && !peerConnections[peerId]) {
            if (myPeerId < peerId) connectToPeer(peerId, true);
          }
        }
      } else if (msg.type === 'peer-joined') {
        console.log('Peer joined:', msg.peerId);
        if (msg.peerId !== myPeerId && !peerConnections[msg.peerId]) {
          if (myPeerId < msg.peerId) connectToPeer(msg.peerId, true);
        }
      } else if (msg.type === 'peer-left') {
        console.log('Peer left:', msg.peerId);
        removePeer(msg.peerId);
      } else if (msg.type === 'signal') {
        handleWebRTCSignal(msg.from, msg.signal);
      }
    }

    function handleWebRTCSignal(peerId, signal) {
      if (signal.type === 'offer') {
        if (!peerConnections[peerId]) connectToPeer(peerId, false);
        var pc = peerConnections[peerId];
        pc.setRemoteDescription(new RTCSessionDescription(signal)).then(function () {
          return pc.createAnswer();
        }).then(function (answer) {
          return pc.setLocalDescription(answer);
        }).then(function () {
          sendSignal(peerId, pc.localDescription);
          flushCandidates(peerId);
        });
      } else if (signal.type === 'answer') {
        var pc = peerConnections[peerId];
        if (pc) {
          pc.setRemoteDescription(new RTCSessionDescription(signal)).then(function () { flushCandidates(peerId); });
        }
      } else if (signal.candidate !== undefined) {
        var pc = peerConnections[peerId];
        if (pc && pc.remoteDescription) {
          pc.addIceCandidate(new RTCIceCandidate(signal));
        } else {
          if (!pendingCandidates[peerId]) pendingCandidates[peerId] = [];
          pendingCandidates[peerId].push(signal);
        }
      }
    }

    function flushCandidates(peerId) {
      var pc = peerConnections[peerId];
      var pending = pendingCandidates[peerId];
      if (pc && pc.remoteDescription && pending) {
        for (var i = 0; i < pending.length; i++) pc.addIceCandidate(new RTCIceCandidate(pending[i]));
        delete pendingCandidates[peerId];
      }
    }

    // ============================================================
    // WEBRTC
    // ============================================================
    function connectToPeer(peerId, isInitiator) {
      if (peerConnections[peerId]) return;
      var pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      peerConnections[peerId] = pc;

      pc.onicecandidate = function (e) { if (e.candidate) sendSignal(peerId, e.candidate.toJSON()); };
      pc.onconnectionstatechange = function () {
        console.log('Peer ' + peerId.slice(0,4) + ' connection: ' + pc.connectionState);
        if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') removePeer(peerId);
      };
      pc.oniceconnectionstatechange = function () {
        console.log('Peer ' + peerId.slice(0,4) + ' ICE: ' + pc.iceConnectionState);
      };

      if (isInitiator) {
        var dc = pc.createDataChannel('game', { ordered: false, maxRetransmits: 0 });
        setupDataChannel(dc, peerId);
        pc.createOffer().then(function (offer) {
          return pc.setLocalDescription(offer);
        }).then(function () { sendSignal(peerId, pc.localDescription); });
      } else {
        pc.ondatachannel = function (e) { setupDataChannel(e.channel, peerId); };
      }
    }

    function setupDataChannel(dc, peerId) {
      function onChannelReady() {
        dataChannels[peerId] = dc;
        connectedPeerIds[peerId] = true;
        console.log('Data channel open with', peerId, '(readyState=' + dc.readyState + ')');
        sendToPeer(peerId, {
          type: 'lobby-join', peerId: myPeerId, slotIndex: mySlotIndex,
          deviceInfo: myDeviceInfo, benchmarkScore: myBenchmark
        });
        if (mySlotIndex >= 0) {
          sendToPeer(peerId, {
            type: 'lobby-sync', slots: serializeSlots(), level: selectedLevel, lobbyState: lobbyState
          });
        }
      }
      if (dc.readyState === 'open') onChannelReady();
      dc.onopen = function () { onChannelReady(); };
      dc.onclose = function () { removePeer(peerId); };
      dc.onmessage = function (e) {
        try { var msg = JSON.parse(e.data); handleDataMessage(peerId, msg); } catch (err) {}
      };
    }

    function removePeer(peerId) {
      if (peerConnections[peerId]) { peerConnections[peerId].close(); delete peerConnections[peerId]; }
      delete dataChannels[peerId];
      delete connectedPeerIds[peerId];
      delete remoteInputs[peerId];
      for (var i = 0; i < 12; i++) {
        if (slots[i].peerId === peerId) {
          slots[i].peerId = null; slots[i].deviceInfo = ''; slots[i].benchmarkScore = 0;
          slots[i].progress = 0; slots[i].ready = false; slots[i].holding = false;
        }
      }
      raceCars = raceCars.filter(function (c) { return c.peerId !== peerId; });
      determineHost();
      var peerCount = 0;
      for (var p in connectedPeerIds) peerCount++;
      if (peerCount === 0 && (lobbyState === 'game' || lobbyState === 'observer' || lobbyState === 'gameover')) {
        console.log('All peers disconnected — returning to lobby');
        lobbyState = 'lobby'; mySlotIndex = -1; cfg = null;
        for (var si = 0; si < 12; si++) { slots[si].peerId = null; slots[si].ready = false; slots[si].progress = 0; slots[si].holding = false; }
        raceCars = []; fTexts = [];
      }
    }

    var MAX_BUFFER = 16384;
    function broadcast(msg) {
      var data = JSON.stringify(msg);
      for (var pid in dataChannels) {
        var dc = dataChannels[pid];
        if (dc && dc.readyState === 'open' && dc.bufferedAmount < MAX_BUFFER) dc.send(data);
      }
    }

    function sendToPeer(peerId, msg) {
      var dc = dataChannels[peerId];
      if (dc && dc.readyState === 'open' && dc.bufferedAmount < MAX_BUFFER) dc.send(JSON.stringify(msg));
    }

    function serializeSlots() {
      var out = [];
      for (var i = 0; i < 12; i++) {
        out.push({ peerId: slots[i].peerId, deviceInfo: slots[i].deviceInfo, benchmarkScore: slots[i].benchmarkScore, progress: slots[i].progress, ready: slots[i].ready, holding: slots[i].holding });
      }
      return out;
    }

    // ============================================================
    // DATA MESSAGE HANDLING
    // ============================================================
    function handleDataMessage(fromPeerId, msg) {
      if (msg.type === 'lobby-join') {
        var si = msg.slotIndex;
        if (si >= 0 && si < 12 && (slots[si].peerId === null || slots[si].peerId === msg.peerId)) {
          slots[si].peerId = msg.peerId; slots[si].deviceInfo = msg.deviceInfo || ''; slots[si].benchmarkScore = msg.benchmarkScore || 0;
        }
        determineHost();
      }
      else if (msg.type === 'lobby-sync') {
        if (msg.slots) {
          for (var i = 0; i < 12 && i < msg.slots.length; i++) {
            var s = msg.slots[i];
            if (s.peerId && s.peerId !== myPeerId) {
              slots[i].peerId = s.peerId; slots[i].deviceInfo = s.deviceInfo; slots[i].benchmarkScore = s.benchmarkScore;
              slots[i].progress = s.progress; slots[i].ready = s.ready; slots[i].holding = s.holding;
            }
          }
        }
        if (msg.level) selectedLevel = msg.level;
        if (msg.lobbyState === 'game' || msg.lobbyState === 'gameover') lobbyState = 'observer';
        determineHost();
      }
      else if (msg.type === 'lobby-hold') {
        var si = findSlotByPeer(msg.peerId);
        if (si >= 0) { slots[si].holding = true; slots[si].progress = msg.progress || 0; }
      }
      else if (msg.type === 'lobby-ready') {
        var si = findSlotByPeer(msg.peerId);
        if (si >= 0) { slots[si].ready = true; slots[si].progress = 100; slots[si].holding = false; checkCountdownStart(); }
      }
      else if (msg.type === 'lobby-allready') {
        for (var i = 0; i < 12; i++) {
          if (slots[i].peerId !== null && !slots[i].ready) { slots[i].ready = true; slots[i].progress = 100; slots[i].holding = false; }
        }
        checkCountdownStart();
      }
      else if (msg.type === 'lobby-release') {
        var si = findSlotByPeer(msg.peerId);
        if (si >= 0) { slots[si].holding = false; slots[si].progress = 0; slots[si].ready = false; }
      }
      else if (msg.type === 'lobby-level') {
        selectedLevel = msg.level;
      }
      else if (msg.type === 'game-start') {
        if (lobbyState !== 'observer') startGame(msg);
      }
      else if (msg.type === 'gameover') {
        if (lobbyState === 'observer') {
          lobbyState = 'lobby'; mySlotIndex = -1; cfg = null;
          for (var si = 0; si < 12; si++) { slots[si].peerId = null; slots[si].ready = false; slots[si].progress = 0; slots[si].holding = false; }
          raceCars = []; fTexts = [];
        } else if (lobbyState === 'game') {
          lobbyState = 'gameover';
          gameOverTime = performance.now() / 1000;
          if (msg.pScores) playerScores = msg.pScores;
          var nPlrs = msg.pScores ? Object.keys(msg.pScores).length : 0;
          fTexts.push({ text: 'GAME OVER', x: GW/2, y: GH*0.55, life: 999, size: 120, stat: true, go: 'main' });
          if (nPlrs > 1) {
            if (msg.winnerPid === myPeerId) {
              fTexts.push({ text: 'YOU WIN!', x: GW/2, y: GH*0.42, life: 999, size: 72, stat: true, go: 'main' });
            } else {
              fTexts.push({ text: (msg.winnerName || '?') + ' wins!', x: GW/2, y: GH*0.42, life: 999, size: 60, stat: true, go: 'main' });
            }
          }
          fTexts.push({ text: 'TAP TO RETURN TO LOBBY', x: GW/2, y: GH*0.64, life: 999, size: 40, stat: true, go: 'prompt' });
          playTone(440, 0.2, 0.3); setTimeout(function(){playTone(330,0.2,0.3);},200);
          setTimeout(function(){playTone(220,0.4,0.25);},400);
        }
      }
      else if (msg.type === 'input') {
        if (isHost) {
          inputsReceived++;
          var prev = remoteInputs[msg.peerId];
          var fe = msg.flapEdge || (prev && prev.flapEdge);
          remoteInputs[msg.peerId] = { l: msg.keys.l, r: msg.keys.r, flap: msg.keys.flap, dn: msg.keys.dn, flapEdge: fe };
        }
      }
      else if (msg.type === 'state') {
        if (!isHost) {
          statesReceived++;
          // Observer: bootstrap from first state message
          if (lobbyState === 'observer' && !cfg && msg.cars && msg.cars.length > 0) {
            wave = msg.wave || 1;
            initTrack(wave);
            cfg = { level: wave };
            raceCars = [];
            for (var i = 0; i < msg.cars.length; i++) {
              var cs = msg.cars[i];
              var si2 = findSlotByPeer(cs.peerId);
              if (si2 < 0) continue;
              var oc = new Car(cs.peerId, si2, cs.x, cs.y);
              oc.angle = cs.angle || 0; oc.speed = cs.speed || 0;
              oc.vx = cs.vx || 0; oc.vy = cs.vy || 0;
              oc.eliminated = !!cs.eliminated;
              raceCars.push(oc);
            }
            if (msg.camY !== undefined) camWorldY = msg.camY;
            fTexts = [];
          }
          if (msg.tick !== undefined) {
            if (msg.tick <= lastStateTick) return;
            lastStateTick = msg.tick;
          }
          lastStateRecvTime = performance.now() / 1000;
          if (cfg) applyHostState(msg);
        }
      }
    }

    function findSlotByPeer(peerId) {
      for (var i = 0; i < 12; i++) { if (slots[i].peerId === peerId) return i; }
      return -1;
    }

    // ============================================================
    // HOST DETERMINATION
    // ============================================================
    function determineHost() {
      var bestScore = -1, bestPeer = null;
      if (mySlotIndex >= 0) { bestScore = myBenchmark; bestPeer = myPeerId; }
      for (var i = 0; i < 12; i++) {
        var s = slots[i];
        if (!s.peerId) continue;
        if (s.benchmarkScore > bestScore || (s.benchmarkScore === bestScore && s.peerId < bestPeer)) {
          bestScore = s.benchmarkScore; bestPeer = s.peerId;
        }
      }
      hostPeerId = bestPeer;
      isHost = (bestPeer === myPeerId);
    }

    // ============================================================
    // LOBBY MECHANICS
    // ============================================================
    var holdingFlap = false, holdStartTime = 0;
    var rapidTapCount = 0, rapidTapLast = 0;
    var RAPID_TAP_WINDOW = 400, RAPID_TAP_THRESHOLD = 8;

    function claimSlot() {
      if (mySlotIndex >= 0) return;
      for (var i = 0; i < 12; i++) {
        if (slots[i].peerId === null) {
          mySlotIndex = i; slots[i].peerId = myPeerId; slots[i].deviceInfo = myDeviceInfo; slots[i].benchmarkScore = myBenchmark;
          broadcast({ type: 'lobby-join', peerId: myPeerId, slotIndex: mySlotIndex, deviceInfo: myDeviceInfo, benchmarkScore: myBenchmark });
          determineHost(); return;
        }
      }
    }

    function claimLocalPlayer2() {
      if (hasLocalPlayer2) return;
      if (!(/Mac|Win|Linux/.test(navigator.userAgent))) return;
      for (var i = 0; i < 12; i++) {
        if (slots[i].peerId === null) {
          localPlayer2PeerId = myPeerId + '-p2'; localPlayer2SlotIndex = i; hasLocalPlayer2 = true;
          slots[i].peerId = localPlayer2PeerId; slots[i].deviceInfo = 'WASD (local)'; slots[i].benchmarkScore = myBenchmark;
          broadcast({ type: 'lobby-join', peerId: localPlayer2PeerId, slotIndex: localPlayer2SlotIndex, deviceInfo: 'WASD (local)', benchmarkScore: myBenchmark });
          return;
        }
      }
    }

    var holdingFlapP2 = false, holdStartTimeP2 = 0;
    function startHoldP2() {
      if (lobbyState !== 'lobby' || mySlotIndex < 0) return;
      if (!hasLocalPlayer2) claimLocalPlayer2();
      if (!hasLocalPlayer2) return;
      if (slots[localPlayer2SlotIndex].ready) return;
      holdingFlapP2 = true; holdStartTimeP2 = performance.now();
      slots[localPlayer2SlotIndex].holding = true;
    }
    function updateHoldP2() {
      if (!holdingFlapP2 || !hasLocalPlayer2 || localPlayer2SlotIndex < 0) return;
      if (slots[localPlayer2SlotIndex].ready) return;
      var elapsed = (performance.now() - holdStartTimeP2) / 1000;
      var progress = Math.min(100, (elapsed / HOLD_DURATION) * 100);
      slots[localPlayer2SlotIndex].progress = progress;
      broadcast({ type: 'lobby-hold', peerId: localPlayer2PeerId, progress: progress });
      if (progress >= 100) {
        slots[localPlayer2SlotIndex].ready = true; slots[localPlayer2SlotIndex].holding = false; holdingFlapP2 = false;
        broadcast({ type: 'lobby-ready', peerId: localPlayer2PeerId }); checkCountdownStart();
      }
    }
    function releaseHoldP2() {
      if (!holdingFlapP2) return;
      holdingFlapP2 = false;
      if (hasLocalPlayer2 && localPlayer2SlotIndex >= 0) {
        slots[localPlayer2SlotIndex].holding = false; slots[localPlayer2SlotIndex].progress = 0;
        broadcast({ type: 'lobby-release', peerId: localPlayer2PeerId });
      }
    }

    function startHold() {
      if (lobbyState !== 'lobby') return;
      if (mySlotIndex < 0) claimSlot();
      if (mySlotIndex < 0) return;
      var now = performance.now();
      if (now - rapidTapLast < RAPID_TAP_WINDOW) rapidTapCount++; else rapidTapCount = 1;
      rapidTapLast = now;
      if (rapidTapCount >= RAPID_TAP_THRESHOLD && mySlotIndex >= 0) {
        for (var i = 0; i < 12; i++) {
          if (slots[i].peerId !== null && !slots[i].ready) {
            if (hasLocalPlayer2 && slots[i].peerId === localPlayer2PeerId) continue;
            slots[i].ready = true; slots[i].progress = 100; slots[i].holding = false;
          }
        }
        broadcast({ type: 'lobby-allready', peerId: myPeerId });
        rapidTapCount = 0; holdingFlap = false; checkCountdownStart(); return;
      }
      if (slots[mySlotIndex].ready) return;
      holdingFlap = true; holdStartTime = performance.now(); slots[mySlotIndex].holding = true;
    }

    function updateHold() {
      if (!holdingFlap || mySlotIndex < 0) return;
      if (slots[mySlotIndex].ready) return;
      var elapsed = (performance.now() - holdStartTime) / 1000;
      var progress = Math.min(100, (elapsed / HOLD_DURATION) * 100);
      slots[mySlotIndex].progress = progress;
      broadcast({ type: 'lobby-hold', peerId: myPeerId, progress: progress });
      if (progress >= 100) {
        slots[mySlotIndex].ready = true; slots[mySlotIndex].holding = false; holdingFlap = false;
        broadcast({ type: 'lobby-ready', peerId: myPeerId }); checkCountdownStart();
      }
    }

    function releaseHold() {
      if (!holdingFlap) return;
      holdingFlap = false;
      if (mySlotIndex >= 0 && !slots[mySlotIndex].ready) {
        slots[mySlotIndex].holding = false; slots[mySlotIndex].progress = 0;
        broadcast({ type: 'lobby-release', peerId: myPeerId });
      }
    }

    function checkCountdownStart() {
      if (lobbyState !== 'lobby') return;
      var anyReady = false;
      for (var i = 0; i < 12; i++) { if (slots[i].ready) { anyReady = true; break; } }
      if (anyReady) {
        lobbyState = 'countdown'; countdownStart = performance.now(); countdownTimer = COUNTDOWN_DURATION;
        for (var i = 0; i < 12; i++) prevHolding[i] = slots[i].holding;
      }
    }

    function updateCountdown(dt) {
      if (lobbyState !== 'countdown') return;
      var newFlapStarted = false;
      for (var i = 0; i < 12; i++) {
        if (slots[i].holding && !prevHolding[i]) newFlapStarted = true;
        prevHolding[i] = slots[i].holding;
      }
      if (newFlapStarted) { countdownStart = performance.now(); countdownTimer = COUNTDOWN_DURATION; return; }
      countdownTimer -= dt;
      if (countdownTimer <= 0) {
        if (isHost) {
          var readySlots = [];
          for (var i = 0; i < 12; i++) { if (slots[i].ready) readySlots.push({ slotIndex: i, peerId: slots[i].peerId }); }
          var startMsg = { type: 'game-start', level: selectedLevel, hostPeerId: myPeerId, playerSlots: readySlots };
          broadcast(startMsg); startGame(startMsg);
        }
      }
    }

    function changeLevel(dir) {
      if (lobbyState !== 'lobby') return;
      for (var i = 0; i < 12; i++) { if (slots[i].holding) return; }
      selectedLevel = Math.max(1, Math.min(100, selectedLevel + dir));
      broadcast({ type: 'lobby-level', level: selectedLevel });
    }

    // ============================================================
    // GAME START
    // ============================================================
    function startGame(msg) {
      lobbyState = 'game';
      hostPeerId = msg.hostPeerId;
      isHost = (msg.hostPeerId === myPeerId);
      gameTime = 0; gameTick = 0; lastHostBroadcast = 0;
      wave = msg.level;
      fTexts = []; playerScores = {};

      initTrack(msg.level);
      cfg = { level: msg.level };

      var playerSlots = msg.playerSlots || [];
      var n = playerSlots.length || 1;
      raceCars = [];

      // Grid start: up to 4 cars per row, rows 90 units apart
      var startY = 600;
      var ROW_SIZE = 4, ROW_GAP = 90;
      for (var pi = 0; pi < playerSlots.length; pi++) {
        var ps = playerSlots[pi];
        var row = Math.floor(pi / ROW_SIZE);
        var col = pi % ROW_SIZE;
        var rowCount = Math.min(ROW_SIZE, n - row * ROW_SIZE);
        var gy = startY - row * ROW_GAP;
        var rowCx = trackCxAtY(gy);
        var rowSpread = Math.min(TRACK_HW * 1.3, rowCount * 90);
        var gx = rowCx + (col - (rowCount - 1) / 2) * (rowSpread / Math.max(1, rowCount - 1));
        var car = new Car(ps.peerId, ps.slotIndex, gx, gy);
        raceCars.push(car);
        playerScores[ps.peerId] = 0;
      }

      // Place cars at ~75% down the screen so there's road ahead
      camWorldY = startY + GH * 0.25;
      camWorldYTarget = camWorldY;

      fTexts.push({ text: 'TRACK ' + msg.level, x: GW/2, y: GH*0.35, life: 3.0, size: 80 });
      fTexts.push({ text: 'RACE!', x: GW/2, y: GH*0.48, life: 2.0, size: 120 });
    }

    // ============================================================
    // INPUT SENDING
    // ============================================================
    var inputSendTimer = 0;
    var INPUT_SEND_INTERVAL = 0.1;
    function sendInputToHost() {
      if (isHost) return;
      inputSendTimer += 0.016;
      var hasChange = false;
      var keyStr = JSON.stringify(keys) + (flapEdge ? '1' : '0');
      if (keyStr !== lastSentKeys) { lastSentKeys = keyStr; hasChange = true; }
      if (hasChange || inputSendTimer >= INPUT_SEND_INTERVAL) {
        inputSendTimer = 0; inputsSent++;
        broadcast({ type:'input', peerId:myPeerId, keys:{ l:keys.l, r:keys.r, flap:keys.flap, dn:keys.dn }, flapEdge:flapEdge });
      }
      if (hasLocalPlayer2) {
        var keyStr2 = JSON.stringify(keys2) + (flapEdge2 ? '1' : '0');
        var hasChange2 = keyStr2 !== lastSentKeys2;
        if (hasChange2) lastSentKeys2 = keyStr2;
        if (hasChange2 || inputSendTimer <= 0.001) {
          broadcast({ type:'input', peerId:localPlayer2PeerId, keys:{ l:keys2.l, r:keys2.r, flap:keys2.flap, dn:keys2.dn }, flapEdge:flapEdge2 });
        }
      }
    }

    // ============================================================
    // RENDERING: LOBBY
    // ============================================================
    function renderLobby() {
      var scX = canvas.width / GW, scY = canvas.height / GH, sc = Math.min(scX, scY);
      var oX = (canvas.width - GW * sc) / 2, oY = (canvas.height - GH * sc) / 2;
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.save(); ctx.translate(oX, oY); ctx.scale(sc, sc);

      // Title: "RACEWAY" + " WebRTC"
      ctx.font = 'bold 48px monospace'; ctx.textBaseline = 'middle';
      var titleLeft = 'RACEWAY ';
      var titleRight = 'WebRTC';
      var fullW = ctx.measureText(titleLeft + titleRight).width;
      var startX = GW * 0.5 - fullW / 2;
      ctx.textAlign = 'left';
      ctx.fillStyle = '#fff';
      ctx.fillText(titleLeft, startX, 50);
      var webrtcX = startX + ctx.measureText(titleLeft).width;
      var webrtcW = ctx.measureText(titleRight).width;
      ctx.fillStyle = webrtcHover ? '#0ff' : '#aaf';
      ctx.fillText(titleRight, webrtcX, 50);
      if (webrtcHover) ctx.fillRect(webrtcX, 50 + 20, webrtcW, 3);
      webrtcHitBox = { x: webrtcX, y: 50 - 24, w: webrtcW, h: 48 };

      // Track chooser (top center)
      var lvY = 110;
      ctx.fillStyle = selectedLevel > 1 ? '#fff' : '#444'; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center';
      ctx.fillText('<', GW * 0.35, lvY);
      ctx.fillStyle = '#0ff'; ctx.font = 'bold 32px monospace';
      ctx.fillText('Track ' + selectedLevel, GW * 0.5, lvY);
      ctx.fillStyle = selectedLevel < 100 ? '#fff' : '#444'; ctx.font = 'bold 36px monospace';
      ctx.fillText('>', GW * 0.65, lvY);

      // 3x4 grid of player slots (left 40%)
      var gridLeft = 40, gridTop = 160;
      var slotW = (GW * 0.38 - 60) / 3;
      var slotH = (GH - gridTop - 40) / 4;
      var gap = 10;

      for (var i = 0; i < 12; i++) {
        var col = i % 3, row = Math.floor(i / 3);
        var sx = gridLeft + col * (slotW + gap);
        var sy = gridTop + row * (slotH + gap);
        var slot = slots[i];
        var isMe = slot.peerId === myPeerId || slot.peerId === localPlayer2PeerId;
        var color = SLOT_COLORS[i].hex;

        // Slot background
        ctx.fillStyle = slot.peerId ? (isMe ? '#1a1a1a' : '#111') : '#050505';
        ctx.strokeStyle = slot.peerId ? color : '#333';
        ctx.lineWidth = isMe ? 3 : 1;
        ctx.beginPath(); ctx.rect(sx, sy, slotW, slotH); ctx.fill(); ctx.stroke();

        // Color swatch
        ctx.fillStyle = color;
        ctx.fillRect(sx + 8, sy + 8, 20, 20);

        // Slot name
        ctx.fillStyle = color; ctx.font = 'bold 13px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText(SLOT_COLORS[i].name, sx + 34, sy + 10);

        if (slot.peerId) {
          // Device info
          ctx.fillStyle = '#888'; ctx.font = '10px monospace';
          var devLines = wrapText(ctx, slot.deviceInfo, slotW - 16);
          ctx.fillText(devLines[0] || '', sx + 8, sy + 30);

          // Ready bar / status
          if (slot.ready) {
            ctx.fillStyle = color; ctx.globalAlpha = 0.3;
            ctx.fillRect(sx, sy, slotW, slotH); ctx.globalAlpha = 1;
            ctx.fillStyle = color; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('READY', sx + slotW / 2, sy + slotH * 0.65);
          } else if (slot.holding || slot.progress > 0) {
            var barH = 6, barW = slotW - 16;
            ctx.fillStyle = '#222'; ctx.fillRect(sx + 8, sy + slotH - barH - 8, barW, barH);
            ctx.fillStyle = color; ctx.fillRect(sx + 8, sy + slotH - barH - 8, barW * slot.progress / 100, barH);
          }
        }
      }

      // Right side: QR code + instructions
      var qrX = GW * 0.46, qrY = 160;
      if (qrCanvas) {
        var qrSize = Math.min(GH - qrY - 40, GW * 0.22);
        ctx.drawImage(qrCanvas, qrX, qrY, qrSize, qrSize);
        ctx.fillStyle = '#888'; ctx.font = '18px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText('erd.mmec.ca/gm3/', qrX, qrY + qrSize + 10);
      }

      // Controls legend
      var infoX = GW * 0.62, infoY = 180;
      ctx.fillStyle = '#ccc'; ctx.font = 'bold 22px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText('CONTROLS', infoX, infoY);
      ctx.font = '18px monospace'; ctx.fillStyle = '#888';
      var lines = [
        '\u2191 / W  — accelerate',
        '\u2193 / S  — brake / reverse',
        '\u2190\u2192 / AD — steer',
        '',
        'Hold \u2191 to ready up',
        'Last racer on screen wins'
      ];
      for (var li = 0; li < lines.length; li++) {
        ctx.fillText(lines[li], infoX, infoY + 35 + li * 26);
      }

      // Countdown overlay
      if (lobbyState === 'countdown') {
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH);
        ctx.fillStyle = '#ff0'; ctx.font = 'bold 120px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(Math.ceil(countdownTimer), GW / 2, GH / 2 - 60);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 36px monospace';
        ctx.fillText('RACE STARTS IN...', GW / 2, GH / 2 + 60);
      }

      // WebRTC tooltip
      if (webrtcTooltip) {
        ctx.fillStyle = 'rgba(0,0,80,0.95)'; ctx.strokeStyle = '#aaf'; ctx.lineWidth = 2;
        var ttW = 520, ttH = 110, ttX = webrtcX - 10, ttY = 70;
        ctx.beginPath(); ctx.rect(ttX, ttY, ttW, ttH); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#eef'; ctx.font = '16px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        var ttLines = [
          'WebRTC: peer-to-peer connections in the browser.',
          'No game server needed after signaling. Players on the',
          'same network auto-group. Click to learn more.'
        ];
        for (var tl = 0; tl < ttLines.length; tl++) ctx.fillText(ttLines[tl], ttX + 12, ttY + 12 + tl * 24);
      }

      ctx.restore();
    }

    // ============================================================
    // RENDERING: GAME (top-down racing)
    // ============================================================
    function renderGame() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      var sc = Math.min(canvas.width / GW, canvas.height / GH);
      var oX = (canvas.width - GW * sc) / 2;
      var oY = (canvas.height - GH * sc) / 2;

      ctx.save();
      ctx.translate(oX, oY);
      ctx.scale(sc, sc);

      if (trackKnots.length >= 2) renderTrack();

      // Cars (back to front: eliminated first, then active)
      for (var i = 0; i < raceCars.length; i++) { if (raceCars[i].eliminated) renderCar(raceCars[i]); }
      for (var i = 0; i < raceCars.length; i++) { if (!raceCars[i].eliminated) renderCar(raceCars[i]); }

      // Danger / elimination indicators
      renderHazards();

      // Race HUD (position standings)
      renderRaceHUD();

      // Floating texts
      var goOutA = 1, tapInA = 0;
      if (lobbyState === 'gameover') {
        var elapsed = (performance.now() / 1000) - gameOverTime;
        var fs = GAME_OVER_LOCKOUT - GAME_OVER_FADE;
        if (elapsed < fs) { goOutA = 1; tapInA = 0; }
        else if (elapsed < GAME_OVER_LOCKOUT) { var f2 = (elapsed - fs) / GAME_OVER_FADE; goOutA = 1 - f2; tapInA = f2; }
        else { goOutA = 0; tapInA = 1; }
      }
      for (var i = 0; i < fTexts.length; i++) {
        var ft = fTexts[i];
        var baseA = Math.min(1, ft.life);
        var useA = baseA;
        if (lobbyState === 'gameover') {
          if (ft.go === 'prompt') useA = tapInA;
          else useA = goOutA;
        }
        if (useA <= 0.001) continue;
        ctx.globalAlpha = useA;
        var fsz = ft.size || 40;
        ctx.fillStyle = ft.col || '#fff';
        ctx.font = 'bold ' + fsz + 'px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = Math.max(3, fsz / 10);
        ctx.strokeText(ft.text, ft.x, ft.y);
        ctx.fillText(ft.text, ft.x, ft.y);
        ctx.globalAlpha = 1;
      }

      ctx.restore();

      // Touch overlay (drawn in canvas pixels, not game coords)
      renderTouchOverlay();
    }

    function renderTrack() {
      var STEP = 55; // world units per sample
      var topWY = camWorldY + GH / 2 + STEP * 2;
      var botWY = camWorldY - GH / 2 - STEP * 2;

      // Collect edge points bottom→top
      var leftPts = [], rightPts = [];
      for (var wy = botWY; wy <= topWY; wy += STEP) {
        var cx = trackCxAtY(wy);
        leftPts.push(wToG(cx - TRACK_HW - TRACK_SHOULDER, wy));
        rightPts.push(wToG(cx + TRACK_HW + TRACK_SHOULDER, wy));
      }
      var roadLeft = [], roadRight = [];
      for (var wy = botWY; wy <= topWY; wy += STEP) {
        var cx = trackCxAtY(wy);
        roadLeft.push(wToG(cx - TRACK_HW, wy));
        roadRight.push(wToG(cx + TRACK_HW, wy));
      }
      if (leftPts.length < 2) return;

      // Grass (full viewport)
      ctx.fillStyle = '#1b5c0c';
      ctx.fillRect(0, 0, GW, GH);

      // Shoulder grass (slightly different shade)
      ctx.fillStyle = '#236b10';
      ctx.beginPath();
      for (var i = 0; i < leftPts.length; i++) { if (i === 0) ctx.moveTo(leftPts[i].x, leftPts[i].y); else ctx.lineTo(leftPts[i].x, leftPts[i].y); }
      for (var i = rightPts.length - 1; i >= 0; i--) ctx.lineTo(rightPts[i].x, rightPts[i].y);
      ctx.closePath(); ctx.fill();

      // Road surface
      ctx.fillStyle = '#383838';
      ctx.beginPath();
      for (var i = 0; i < roadLeft.length; i++) { if (i === 0) ctx.moveTo(roadLeft[i].x, roadLeft[i].y); else ctx.lineTo(roadLeft[i].x, roadLeft[i].y); }
      for (var i = roadRight.length - 1; i >= 0; i--) ctx.lineTo(roadRight[i].x, roadRight[i].y);
      ctx.closePath(); ctx.fill();

      // Road edge lines (yellow)
      ctx.strokeStyle = '#e8c010'; ctx.lineWidth = 9;
      ctx.beginPath();
      for (var i = 0; i < roadLeft.length; i++) { if (i === 0) ctx.moveTo(roadLeft[i].x, roadLeft[i].y); else ctx.lineTo(roadLeft[i].x, roadLeft[i].y); }
      ctx.stroke();
      ctx.beginPath();
      for (var i = 0; i < roadRight.length; i++) { if (i === 0) ctx.moveTo(roadRight[i].x, roadRight[i].y); else ctx.lineTo(roadRight[i].x, roadRight[i].y); }
      ctx.stroke();

      // Center dashes (white)
      var DASH_W = 90, GAP_W = 70, PERIOD = DASH_W + GAP_W;
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 5;
      var dashStart = Math.floor(botWY / PERIOD) * PERIOD;
      for (var dwy = dashStart; dwy < topWY; dwy += PERIOD) {
        ctx.beginPath();
        var steps = Math.max(2, Math.ceil(DASH_W / STEP));
        for (var j = 0; j <= steps; j++) {
          var t = j / steps;
          var wyT = dwy + t * DASH_W;
          if (wyT > topWY) break;
          var cx2 = trackCxAtY(wyT);
          var gp2 = wToG(cx2, wyT);
          if (j === 0) ctx.moveTo(gp2.x, gp2.y); else ctx.lineTo(gp2.x, gp2.y);
        }
        ctx.stroke();
      }

      // Start line
      var startY = 600;
      if (startY >= botWY && startY <= topWY) {
        var slCx = trackCxAtY(startY);
        var slGp0 = wToG(slCx - TRACK_HW, startY);
        var slGp1 = wToG(slCx + TRACK_HW, startY);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 12;
        ctx.beginPath(); ctx.moveTo(slGp0.x, slGp0.y); ctx.lineTo(slGp1.x, slGp1.y); ctx.stroke();
        // Checker squares
        var sqW = 24;
        var sqCount = Math.floor((TRACK_HW * 2) / sqW);
        for (var sq = 0; sq < sqCount; sq++) {
          if ((sq % 2) === 0) {
            var sqGp = wToG(slCx - TRACK_HW + sq * sqW, startY);
            ctx.fillStyle = '#fff'; ctx.fillRect(sqGp.x, sqGp.y - 6, sqW, 12);
          }
        }
      }

      // Elimination zone marker (bottom of screen danger line)
      var elimY = camWorldY - GH / 2;
      var elimGp0 = wToG(0, elimY);
      var elimGp1 = wToG(GW, elimY);
      var elimFlash = (Math.sin(gameTime * 5) * 0.5 + 0.5);
      ctx.strokeStyle = 'rgba(255,0,0,' + (0.4 + elimFlash * 0.6) + ')';
      ctx.lineWidth = 6;
      ctx.setLineDash([20, 15]);
      ctx.beginPath(); ctx.moveTo(elimGp0.x, elimGp0.y); ctx.lineTo(elimGp1.x, elimGp1.y); ctx.stroke();
      ctx.setLineDash([]);
    }

    function renderCar(car) {
      if (car.eliminated) {
        // Eliminated cars: just a faded ghost
        var gp = wToG(car.x, car.y);
        if (gp.y < -100 || gp.y > GH + 100) return;
        ctx.save(); ctx.globalAlpha = 0.25;
        ctx.translate(gp.x, gp.y);
        ctx.rotate(car.angle);
        ctx.fillStyle = '#555';
        ctx.fillRect(-CAR_W / 2, -CAR_H / 2, CAR_W, CAR_H);
        ctx.restore();
        return;
      }

      var gp = wToG(car.x, car.y);
      if (gp.y < -CAR_H * 2 || gp.y > GH + CAR_H * 2) return;

      ctx.save();
      ctx.translate(gp.x, gp.y);
      ctx.rotate(car.angle);

      var w = CAR_W, h = CAR_H;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.beginPath(); roundRect(ctx, -w / 2 + 4, -h / 2 + 4, w, h, 7); ctx.fill();

      // Body
      ctx.fillStyle = car.color;
      ctx.beginPath(); roundRect(ctx, -w / 2, -h / 2, w, h, 7); ctx.fill();

      // Roof / cockpit
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.beginPath(); roundRect(ctx, -w * 0.36, -h * 0.1, w * 0.72, h * 0.35, 4); ctx.fill();

      // Windshield (front)
      ctx.fillStyle = 'rgba(120,200,255,0.55)';
      ctx.beginPath(); roundRect(ctx, -w * 0.32, -h * 0.44, w * 0.64, h * 0.18, 3); ctx.fill();

      // Front bumper stripe
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fillRect(-w * 0.4, -h / 2, w * 0.8, 5);

      // Rear spoiler
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(-w * 0.42, h / 2 - 8, w * 0.84, 8);

      // Wheel arches (4 wheels)
      ctx.fillStyle = '#111';
      var ww = 9, wh = 18;
      ctx.fillRect(-w / 2 - 2, -h / 2 + 8, ww, wh);    // front-left
      ctx.fillRect(w / 2 - ww + 2, -h / 2 + 8, ww, wh); // front-right
      ctx.fillRect(-w / 2 - 2, h / 2 - wh - 8, ww, wh); // rear-left
      ctx.fillRect(w / 2 - ww + 2, h / 2 - wh - 8, ww, wh); // rear-right

      ctx.restore();

      // Name tag above car
      var isMe = car.peerId === myPeerId || car.peerId === localPlayer2PeerId;
      ctx.save();
      ctx.translate(gp.x, gp.y - h / 2 - 12);
      ctx.fillStyle = car.color;
      ctx.strokeStyle = 'rgba(0,0,0,0.8)';
      ctx.lineWidth = 3;
      ctx.font = 'bold ' + (isMe ? 20 : 16) + 'px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.strokeText(SLOT_COLORS[car.slotIndex].name, 0, 0);
      ctx.fillText(SLOT_COLORS[car.slotIndex].name, 0, 0);
      ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
    }

    function renderHazards() {
      if (raceCars.length === 0) return;
      var bottomWY = camWorldY - GH / 2;

      for (var i = 0; i < raceCars.length; i++) {
        var car = raceCars[i];
        if (car.eliminated) continue;
        var gp = wToG(car.x, car.y);
        var distToBottom = car.y - bottomWY;
        var dangerThresh = GH * 0.35;

        if (distToBottom < dangerThresh) {
          var dangerFrac = 1 - distToBottom / dangerThresh;
          var flash = Math.sin(gameTime * (4 + dangerFrac * 8)) * 0.5 + 0.5;
          ctx.globalAlpha = dangerFrac * (0.5 + flash * 0.5);
          ctx.fillStyle = '#ff2200';
          ctx.font = 'bold 22px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
          var dgpY = Math.max(20, Math.min(GH - 20, gp.y - CAR_H / 2 - 8));
          ctx.fillText('! DANGER !', gp.x, dgpY);
          ctx.globalAlpha = 1;
        }
      }
    }

    function renderRaceHUD() {
      // Sort cars by world Y descending (leader first)
      var sorted = raceCars.slice().sort(function(a, b) { return b.y - a.y; });
      var panelX = GW - 260, panelY = 60;
      var rowH = 48;

      for (var i = 0; i < sorted.length; i++) {
        var car = sorted[i];
        var pos = i + 1;
        var suffix = pos === 1 ? 'st' : pos === 2 ? 'nd' : pos === 3 ? 'rd' : 'th';
        var hy = panelY + i * rowH;
        var isElim = car.eliminated;
        var isMe = car.peerId === myPeerId || car.peerId === localPlayer2PeerId;

        ctx.globalAlpha = isElim ? 0.35 : 1;

        // Position badge
        ctx.fillStyle = isElim ? '#444' : car.color;
        ctx.font = 'bold 28px monospace';
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        ctx.fillText(pos + suffix, panelX - 10, hy + rowH / 2);

        // Name
        ctx.fillStyle = isElim ? '#444' : '#ccc';
        ctx.font = (isMe ? 'bold ' : '') + '22px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(SLOT_COLORS[car.slotIndex].name, panelX, hy + rowH / 2);

        // "YOU" indicator
        if (isMe) {
          ctx.fillStyle = car.color;
          ctx.font = 'bold 14px monospace';
          ctx.fillText('\u25c4', panelX - 30, hy + rowH / 2);
        }

        if (isElim) {
          ctx.fillStyle = '#f00'; ctx.font = 'bold 16px monospace';
          ctx.fillText('OUT', panelX + 150, hy + rowH / 2);
        }

        ctx.globalAlpha = 1;
      }

      // Speed indicator for own car
      var myCar = null;
      for (var i = 0; i < raceCars.length; i++) {
        if (raceCars[i].peerId === myPeerId) { myCar = raceCars[i]; break; }
      }
      if (myCar && !myCar.eliminated) {
        var spd = Math.round(Math.abs(myCar.speed));
        ctx.fillStyle = '#888'; ctx.font = '20px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
        ctx.fillText(spd + ' px/s', 20, GH - 20);
      }

      // Game time
      ctx.fillStyle = '#555'; ctx.font = '18px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText(gameTime.toFixed(1) + 's', 20, 20);
    }

    // ============================================================
    // TOUCH OVERLAY (drawn in screen space, outside game ctx.scale)
    // ============================================================
    var touchZoneFlash = { l: 0, r: 0, f: 0, dn: 0 };
    function isPortrait() { return window.innerHeight > window.innerWidth; }

    function renderTouchOverlay() {
      var cw = canvas.width, ch = canvas.height;
      if (lobbyState !== 'game') return;

      ctx.save();
      var sc = Math.min(cw / GW, ch / GH);
      var fontSize = Math.round(ch * 0.04);
      ctx.font = 'bold ' + fontSize + 'px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

      if (isPortrait()) {
        // Portrait: 4 quadrant zones
        var zones = [
          { key: 'l', flash: touchZoneFlash.l, x: 0,      y: 0,    w: cw/2, h: ch/2, label: 'LEFT' },
          { key: 'r', flash: touchZoneFlash.r, x: cw/2,   y: 0,    w: cw/2, h: ch/2, label: 'RIGHT' },
          { key: 'f', flash: touchZoneFlash.f, x: 0,      y: ch/2, w: cw/2, h: ch/2, label: 'GAS' },
          { key: 'dn', flash: touchZoneFlash.dn, x: cw/2, y: ch/2, w: cw/2, h: ch/2, label: 'BRAKE' }
        ];
        for (var zi = 0; zi < zones.length; zi++) {
          var z = zones[zi];
          if (z.flash > 0) {
            ctx.globalAlpha = z.flash * 0.35;
            ctx.fillStyle = '#fff'; ctx.fillRect(z.x, z.y, z.w, z.h);
            ctx.globalAlpha = z.flash;
            ctx.fillStyle = '#fff';
            ctx.fillText(z.label, z.x + z.w / 2, z.y + z.h / 2);
          }
        }
      } else {
        // Landscape: left = left-turn, right = right-turn, top-center = gas, bottom-center = brake
        var fifth = cw / 5;
        var zones2 = [
          { key: 'l',  flash: touchZoneFlash.l,  x: 0,        y: 0,    w: fifth,     h: ch, label: 'LEFT' },
          { key: 'r',  flash: touchZoneFlash.r,  x: fifth * 4, y: 0,   w: fifth,     h: ch, label: 'RIGHT' },
          { key: 'f',  flash: touchZoneFlash.f,  x: fifth,    y: 0,    w: fifth * 3, h: ch/2, label: 'GAS' },
          { key: 'dn', flash: touchZoneFlash.dn, x: fifth,    y: ch/2, w: fifth * 3, h: ch/2, label: 'BRAKE' }
        ];
        for (var zi = 0; zi < zones2.length; zi++) {
          var z = zones2[zi];
          if (z.flash > 0) {
            ctx.globalAlpha = z.flash * 0.3;
            ctx.fillStyle = '#fff'; ctx.fillRect(z.x, z.y, z.w, z.h);
            ctx.globalAlpha = z.flash * 0.8;
            ctx.fillStyle = '#fff';
            ctx.fillText(z.label, z.x + z.w / 2, z.y + z.h / 2);
          }
        }
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // Classify a touch point into game keys (for game mode)
    function touchToKeys(clientX, clientY, outKeys) {
      var w = window.innerWidth, h = window.innerHeight;
      var tx = clientX / w, ty = clientY / h;
      if (isPortrait()) {
        // Quadrant scheme
        if (tx < 0.5) { outKeys.l = true; } else { outKeys.r = true; }
        if (ty < 0.5) { outKeys.flap = true; } else { outKeys.dn = true; }
      } else {
        // Landscape: left fifth = steer left, right fifth = steer right, center-top = gas, center-bottom = brake
        if (tx < 0.2) { outKeys.l = true; }
        else if (tx > 0.8) { outKeys.r = true; }
        else if (ty < 0.5) { outKeys.flap = true; }
        else { outKeys.dn = true; }
      }
    }

    function updateGameKeysFromTouches(touches) {
      keys.l = false; keys.r = false; keys.flap = false; keys.dn = false;
      touchZoneFlash.l = 0; touchZoneFlash.r = 0; touchZoneFlash.f = 0; touchZoneFlash.dn = 0;
      for (var i = 0; i < touches.length; i++) {
        var outK = { l: false, r: false, flap: false, dn: false };
        touchToKeys(touches[i].clientX, touches[i].clientY, outK);
        if (outK.l) { keys.l = true; touchZoneFlash.l = 0.5; }
        if (outK.r) { keys.r = true; touchZoneFlash.r = 0.5; }
        if (outK.flap) { keys.flap = true; touchZoneFlash.f = 0.5; }
        if (outK.dn) { keys.dn = true; touchZoneFlash.dn = 0.5; }
      }
    }

    // getTouchZones for LOBBY (lobby-mode hold detection only)
    function getTouchZones(clientX, clientY) {
      var w = window.innerWidth, h = window.innerHeight;
      var result = { l: false, r: false, f: false };
      if (isPortrait()) {
        if (clientY < h / 3) return result;
        var col = clientX / w;
        if (col < 0.33) result.l = true;
        else if (col > 0.67) result.r = true;
        else result.f = true;
      } else {
        var fifth = w / 5;
        if (clientX < fifth) result.l = true;
        else if (clientX > fifth * 4) result.r = true;
        else result.f = true;
      }
      return result;
    }

    // ============================================================
    // INPUT HANDLING
    // ============================================================
    window.addEventListener('keydown', function (e) {
      initAudio();
      if (lobbyState === 'lobby' || lobbyState === 'countdown') {
        if (e.key === 'ArrowLeft') { changeLevel(-1); e.preventDefault(); return; }
        if (e.key === 'ArrowRight') { changeLevel(1); e.preventDefault(); return; }
        if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
          if (e.repeat) { e.preventDefault(); return; }
          var side = (e.key === 'w' || e.key === 'W') ? 'wasd' : 'arrows';
          if (mySlotIndex < 0) { p1Side = side; startHold(); }
          else if (side === p1Side || !p1Side) { if (!p1Side) p1Side = side; startHold(); }
          else { startHoldP2(); }
          e.preventDefault(); return;
        }
      }
      if (lobbyState === 'gameover') {
        if (performance.now() / 1000 - gameOverTime < GAME_OVER_LOCKOUT) { e.preventDefault(); return; }
        lobbyState = 'lobby'; mySlotIndex = -1; cfg = null;
        hasLocalPlayer2 = false; localPlayer2PeerId = null; localPlayer2SlotIndex = -1;
        p1Side = null;
        for (var si = 0; si < 12; si++) { slots[si].peerId = null; slots[si].ready = false; slots[si].progress = 0; slots[si].holding = false; }
        raceCars = []; fTexts = [];
        e.preventDefault(); return;
      }
      if (lobbyState === 'game') {
        if (e.key === 'Escape' || e.key === '`') {
          if (isHost) {
            lobbyState = 'gameover';
            fTexts.push({ text: 'RACE ENDED', x: GW/2, y: GH*0.5, life: 999, size: 80, stat: true, go: 'main' });
            fTexts.push({ text: 'Tap to return to lobby', x: GW/2, y: GH*0.6, life: 999, size: 40, stat: true, go: 'prompt' });
            broadcast({ type: 'gameover', wave: wave, winnerPid: null, winnerName: 'Nobody', pScores: playerScores, quit: true });
          }
          e.preventDefault(); return;
        }
        var isWasd = (e.key === 'a' || e.key === 'A' || e.key === 'd' || e.key === 'D' || e.key === 'w' || e.key === 'W' || e.key === 's' || e.key === 'S');
        var isArrow = (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ');
        var isP2Key = hasLocalPlayer2 && ((isWasd && p1Side !== 'wasd') || (isArrow && p1Side === 'wasd'));
        var k = isP2Key ? keys2 : keys;
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') k.l = true;
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') k.r = true;
        if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w' || e.key === 'W') {
          if (!k.flap) { if (isP2Key) flapEdge2 = true; else flapEdge = true; }
          k.flap = true;
        }
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') k.dn = true;
      }
      e.preventDefault();
    });

    window.addEventListener('keyup', function (e) {
      if (lobbyState === 'lobby' || lobbyState === 'countdown') {
        if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
          var side2 = (e.key === 'w' || e.key === 'W') ? 'wasd' : 'arrows';
          if (side2 === p1Side) releaseHold();
          else if (hasLocalPlayer2) releaseHoldP2();
          else releaseHold();
          return;
        }
      }
      if (lobbyState === 'game') {
        var isWasd2 = (e.key === 'a' || e.key === 'A' || e.key === 'd' || e.key === 'D' || e.key === 'w' || e.key === 'W' || e.key === 's' || e.key === 'S');
        var isArrow2 = (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ');
        var isP2Up = hasLocalPlayer2 && ((isWasd2 && p1Side !== 'wasd') || (isArrow2 && p1Side === 'wasd'));
        var ku = isP2Up ? keys2 : keys;
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') ku.l = false;
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') ku.r = false;
        if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w' || e.key === 'W') ku.flap = false;
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') ku.dn = false;
      }
    });

    // Touch input
    var touchHolding = false;
    canvas.addEventListener('touchstart', function (e) {
      e.preventDefault();
      initAudio();
      if (lobbyState === 'lobby' || lobbyState === 'countdown') {
        var g = clientToGame(e.touches[0].clientX, e.touches[0].clientY);
        var tx = g.x, ty = g.y;
        if (lobbyState === 'lobby') {
          if (tx > GW * 0.3 && tx < GW * 0.4 && ty > 80 && ty < 140) { changeLevel(-1); return; }
          if (tx > GW * 0.6 && tx < GW * 0.7 && ty > 80 && ty < 140) { changeLevel(1); return; }
        }
        touchHolding = true; startHold(); return;
      }
      if (lobbyState === 'gameover') {
        if (performance.now() / 1000 - gameOverTime < GAME_OVER_LOCKOUT) return;
        lobbyState = 'lobby'; mySlotIndex = -1; cfg = null;
        for (var si = 0; si < 12; si++) { slots[si].peerId = null; slots[si].ready = false; slots[si].progress = 0; slots[si].holding = false; }
        raceCars = []; fTexts = [];
        return;
      }
      if (lobbyState === 'game') {
        updateGameKeysFromTouches(e.touches);
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', function (e) {
      e.preventDefault();
      if (lobbyState === 'game') updateGameKeysFromTouches(e.touches);
    }, { passive: false });

    canvas.addEventListener('touchend', function (e) {
      if (lobbyState === 'lobby' || lobbyState === 'countdown') {
        if (touchHolding) { touchHolding = false; releaseHold(); }
        return;
      }
      if (lobbyState === 'game') {
        updateGameKeysFromTouches(e.touches); // re-evaluate remaining touches
      }
    });

    function clientToGame(cx, cy) {
      var rect = canvas.getBoundingClientRect();
      var px = (cx - rect.left) * (canvas.width / rect.width);
      var py = (cy - rect.top) * (canvas.height / rect.height);
      var scX = canvas.width / GW, scY = canvas.height / GH, sc = Math.min(scX, scY);
      var oX = (canvas.width - GW * sc) / 2, oY = (canvas.height - GH * sc) / 2;
      return { x: (px - oX) / sc, y: (py - oY) / sc };
    }
    function isInWebrtcHit(gx, gy) {
      if (!webrtcHitBox) return false;
      var b = webrtcHitBox;
      return gx >= b.x && gx <= b.x + b.w && gy >= b.y && gy <= b.y + b.h;
    }

    canvas.addEventListener('mousemove', function (e) {
      if (lobbyState !== 'lobby' && lobbyState !== 'countdown') { webrtcHover = false; webrtcTooltip = false; canvas.style.cursor = ''; return; }
      var g = clientToGame(e.clientX, e.clientY);
      var hit = isInWebrtcHit(g.x, g.y);
      webrtcHover = hit; webrtcTooltip = hit;
      canvas.style.cursor = hit ? 'pointer' : '';
    });
    canvas.addEventListener('mouseleave', function () { webrtcHover = false; webrtcTooltip = false; canvas.style.cursor = ''; });
    canvas.addEventListener('click', function (e) {
      if (lobbyState !== 'lobby' && lobbyState !== 'countdown') return;
      var g = clientToGame(e.clientX, e.clientY);
      if (isInWebrtcHit(g.x, g.y)) window.open('https://en.wikipedia.org/wiki/WebRTC', '_blank');
    });

    // ============================================================
    // CANVAS RESIZE
    // ============================================================
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

    // ============================================================
    // MAIN GAME LOOP
    // ============================================================
    function gameLoop(now) {
      if (!lastTime) lastTime = now;
      var dt = (now - lastTime) / 1000;
      lastTime = now;
      if (dt > 0.05) dt = 0.05;
      if (dt < 0.001) dt = 0.001;

      // Decay touch flashes
      for (var k in touchZoneFlash) { if (touchZoneFlash[k] > 0) touchZoneFlash[k] -= dt * 3; }

      if (lobbyState === 'lobby') {
        updateHold(); updateHoldP2(); renderLobby();
      }
      else if (lobbyState === 'countdown') {
        updateHold(); updateHoldP2(); updateCountdown(dt); renderLobby();
      }
      else if (lobbyState === 'game') {
        sendInputToHost();
        if (isHost) {
          gameStep(dt);
          lastHostBroadcast += dt;
          if (lastHostBroadcast >= HOST_BROADCAST_INTERVAL) { hostBroadcastState(); lastHostBroadcast = 0; }
        } else {
          gameStep(dt);
        }
        renderGame();
      }
      else if (lobbyState === 'gameover') {
        renderGame();
      }
      else if (lobbyState === 'observer') {
        if (cfg) updateCamera(dt);
        if (lastStateRecvTime > 0 && (performance.now() / 1000) - lastStateRecvTime > 5) {
          console.log('Observer: no state for 5s — returning to lobby');
          lobbyState = 'lobby'; mySlotIndex = -1; cfg = null;
          for (var si = 0; si < 12; si++) { slots[si].peerId = null; slots[si].ready = false; slots[si].progress = 0; slots[si].holding = false; }
          raceCars = []; fTexts = [];
        }
        renderGame();
        var scO = Math.min(canvas.width / GW, canvas.height / GH);
        var oXo = (canvas.width - GW * scO) / 2, oYo = (canvas.height - GH * scO) / 2;
        ctx.save(); ctx.translate(oXo, oYo); ctx.scale(scO, scO);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.font = 'bold 120px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('OBSERVER', GW / 2, GH / 2);
        ctx.font = '28px monospace'; ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillText('Race in progress — waiting for next round', GW / 2, GH / 2 + 80);
        ctx.restore();
      }

      hud.textContent = BUILD + ' | ' + myPeerId.slice(0, 4) + ' | ' + (isHost ? 'HOST' : 'client') + ' | ' + lobbyState;
      requestAnimationFrame(gameLoop);
    }

    // ============================================================
    // INIT
    // ============================================================
    function init() {
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      myBenchmark = runBenchmark();
      console.log('Benchmark score:', myBenchmark);
      var qrUrl = 'https://erd.mmec.ca/gm3/';
      qrCanvas = generateQR(qrUrl);
      connectSignaling();
      requestAnimationFrame(gameLoop);
    }

    init();
  </script> </body> </html>
